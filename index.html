<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Find your waterproof back-to-school Vessi match and enter the giveaway.">
    <title>Vessi Back-to-School Match Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #171512;
        --muted: #6a625b;
        --paper: #f4f0e9;
        --panel: #fffaf3;
        --mist: #dcebe2;
        --moss: #526d58;
        --moss-dark: #2f4738;
        --clay: #df7f5f;
        --sun: #f4c24f;
        --aqua: #c9e5e9;
        --line: rgba(36, 31, 27, 0.14);
        --shadow: 0 24px 80px rgba(36, 31, 27, 0.14);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100%;
        margin: 0;
        background:
          linear-gradient(125deg, rgba(201, 229, 233, 0.64), rgba(244, 240, 233, 0.2) 42%, rgba(244, 194, 79, 0.14)),
          var(--paper);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: minmax(280px, 0.88fr) minmax(420px, 1.12fr);
      }

      .brand-panel {
        position: relative;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        overflow: hidden;
        background: #314d3b;
        color: #fffaf2;
      }

      .brand-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(23, 21, 18, 0.04), rgba(23, 21, 18, 0.28)),
          radial-gradient(circle at 80% 16%, rgba(244, 194, 79, 0.28), transparent 26%),
          radial-gradient(circle at 8% 82%, rgba(201, 229, 233, 0.32), transparent 28%);
        pointer-events: none;
      }

      .brand-top,
      .brand-media,
      .brand-bottom {
        position: relative;
        z-index: 1;
      }

      .brand-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .logo {
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .campaign-pill {
        border: 1px solid rgba(255, 250, 242, 0.42);
        border-radius: 999px;
        padding: 8px 12px;
        color: rgba(255, 250, 242, 0.86);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-media {
        display: grid;
        grid-template-columns: 1.08fr 0.92fr;
        grid-template-rows: 1fr 0.86fr;
        gap: 14px;
        min-height: 42dvh;
        margin-top: 42px;
      }

      .media-card {
        position: relative;
        min-height: 160px;
        overflow: hidden;
        border: 1px solid rgba(255, 250, 242, 0.2);
        border-radius: var(--radius);
        background: rgba(255, 250, 242, 0.08);
      }

      .media-card.large {
        grid-row: span 2;
      }

      .media-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .media-card.product {
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #f4f0e9, #c9e5e9);
      }

      .media-card.product img {
        width: 90%;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(23, 21, 18, 0.18));
      }

      .media-caption {
        position: absolute;
        left: 12px;
        bottom: 12px;
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(23, 21, 18, 0.72);
        color: #fffaf2;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .brand-bottom {
        margin-top: auto;
        padding-top: 32px;
      }

      .brand-bottom h1 {
        max-width: 560px;
        margin: 0 0 16px;
        font-size: clamp(44px, 6vw, 84px);
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .brand-bottom p {
        max-width: 470px;
        margin: 0;
        color: rgba(255, 250, 242, 0.86);
        font-size: 17px;
        line-height: 1.55;
      }

      .quiz-panel {
        min-height: 100dvh;
        display: grid;
        align-items: center;
        padding: 48px;
      }

      .quiz-card {
        width: min(100%, 760px);
        margin: 0 auto;
        background: rgba(255, 250, 243, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(18px);
      }

      .progress-wrap {
        height: 8px;
        background: rgba(57, 90, 69, 0.12);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--moss), var(--clay));
        transition: width 320ms ease;
      }

      .screen {
        display: none;
        min-height: 620px;
        padding: 40px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
        animation: rise 220ms ease both;
      }

      @keyframes rise {
        from {
          opacity: 0.01;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kicker {
        margin: 0 0 16px;
        color: var(--moss-dark);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h2 {
        margin: 0;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
      }

      .prompt {
        margin: 18px 0 0;
        max-width: 610px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 32px;
      }

      .option {
        min-height: 78px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        text-align: left;
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .option:hover,
      .option:focus-visible {
        border-color: rgba(57, 90, 69, 0.55);
        background: #fff;
        transform: translateY(-1px);
        outline: none;
      }

      .option-key {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--mist);
        color: var(--moss-dark);
        font-size: 13px;
        font-weight: 800;
      }

      .option span:last-child {
        font-weight: 750;
        line-height: 1.3;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: auto;
        padding-top: 36px;
      }

      .primary,
      .secondary {
        min-height: 50px;
        border-radius: var(--radius);
        padding: 0 20px;
        font-weight: 800;
        text-decoration: none;
      }

      .primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        background: var(--ink);
        color: #fffaf2;
      }

      .secondary {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
        color: var(--ink);
      }

      .ghost {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-weight: 800;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 30px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
      }

      input:focus,
      select:focus {
        border-color: var(--moss);
        outline: 3px solid rgba(95, 127, 104, 0.18);
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .checkbox-row input {
        width: 18px;
        min-height: 18px;
        margin-top: 1px;
      }

      .mini-note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .insight-card {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 24px;
        align-items: center;
        margin-top: 28px;
        border: 1px solid rgba(95, 127, 104, 0.28);
        border-left: 5px solid var(--moss);
        border-radius: var(--radius);
        padding: 20px;
        background: rgba(216, 231, 225, 0.42);
      }

      .insight-card p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .insight-card img {
        width: 100%;
        max-width: 180px;
        justify-self: center;
        filter: drop-shadow(0 18px 24px rgba(36, 31, 27, 0.16));
      }

      .result-layout {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 28px;
        align-items: start;
        margin-top: 24px;
      }

      .result-card,
      .profile-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.7);
        padding: 18px;
      }

      .product-art {
        width: 100%;
        max-width: 240px;
        display: block;
        margin: 0 auto 12px;
        filter: drop-shadow(0 18px 28px rgba(36, 31, 27, 0.18));
      }

      .lifestyle-art {
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-top: 14px;
        border-radius: var(--radius);
        object-fit: cover;
        display: block;
      }

      .result-name {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 850;
      }

      .benefit-list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .benefit-list li {
        display: flex;
        gap: 10px;
        color: var(--muted);
        line-height: 1.45;
      }

      .benefit-list li::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        margin-top: 8px;
        border-radius: 50%;
        background: var(--clay);
      }

      .profile-card {
        margin-top: 18px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .profile-item {
        border-radius: var(--radius);
        background: rgba(247, 241, 232, 0.8);
        padding: 12px;
      }

      .profile-item strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--moss-dark);
      }

      .profile-item span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .error {
        min-height: 18px;
        margin-top: 14px;
        color: #9b3528;
        font-size: 14px;
        font-weight: 800;
      }

      .footer-trust {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .image-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .image-strip img {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: var(--radius);
        object-fit: cover;
        display: block;
      }

      .trust-pill {
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 8px 11px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.56);
      }

      @media (max-width: 1024px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .brand-panel {
          min-height: 430px;
        }

        .brand-bottom h1 {
          font-size: clamp(40px, 8vw, 72px);
        }

        .quiz-panel {
          min-height: auto;
          padding: 28px;
        }
      }

      @media (max-width: 720px) {
        .brand-panel {
          min-height: auto;
          padding: 20px;
        }

        .brand-media {
          min-height: 250px;
          margin-top: 28px;
        }

        .brand-bottom p {
          font-size: 15px;
        }

        .brand-bottom h1 {
          font-size: 42px;
          line-height: 0.98;
        }

        .quiz-panel {
          padding: 16px;
        }

        .screen {
          min-height: 620px;
          padding: 28px 20px;
        }

        .option-grid,
        .form-grid,
        .result-layout,
        .profile-grid {
          grid-template-columns: 1fr;
        }

        .insight-card {
          grid-template-columns: 1fr;
        }

        .insight-card img {
          max-width: 150px;
        }
      }

      @media (max-width: 420px) {
        .brand-panel {
          min-height: auto;
        }

        .brand-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .campaign-pill {
          white-space: normal;
        }

        h2 {
          font-size: 34px;
        }

        .prompt {
          font-size: 16px;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .primary,
        .secondary,
        .ghost {
          width: 100%;
        }

        .image-strip {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="brand-panel" aria-label="Vessi back-to-school campaign">
        <div class="brand-top">
          <div class="logo">Vessi</div>
          <div class="campaign-pill">Back-to-school match quiz</div>
        </div>
        <div class="brand-media" aria-hidden="true">
          <div class="media-card large">
            <img src="img/brand-work.jpg" alt="">
            <span class="media-caption">Rain ready</span>
          </div>
          <div class="media-card">
            <img src="img/weekend-neo-lifestyle.jpg" alt="">
            <span class="media-caption">Waterproof knit</span>
          </div>
          <div class="media-card product">
            <img src="img/weekend-classic.png" alt="">
            <span class="media-caption">Everyday sneaker</span>
          </div>
        </div>
        <div class="brand-bottom">
          <h1>Find your waterproof school-day sneaker.</h1>
          <p>Answer a few quick questions, get matched to the Vessi pair built for your day, and enter the back-to-school giveaway.</p>
        </div>
      </aside>

      <section class="quiz-panel">
        <div class="quiz-card" aria-live="polite">
          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div id="screen" class="screen active"></div>
        </div>
      </section>
    </main>

    <script>
      const products = {
        classic: {
          name: "Weekend Classic",
          short: "Waterproof everyday sneaker",
          image: "img/weekend-classic.png",
          lifestyle: "img/weekend-classic-lifestyle.jpg",
          url: "https://vessi.com/products/womens-weekend-classic-marble-white",
          cta: "Shop Weekend Classic"
        },
        neo: {
          name: "Weekend Neo",
          short: "Comfort-first waterproof sneaker",
          image: "img/weekend-neo.png",
          lifestyle: "img/weekend-neo-lifestyle.jpg",
          url: "https://vessi.com/products/mens-weekend-neo-black-white",
          cta: "Shop Weekend Neo"
        },
        slip: {
          name: "Weekend Slip-On",
          short: "Easy on/off waterproof sneaker",
          image: "img/weekend-slip-on.png",
          lifestyle: "img/brand-everyday.jpg",
          url: "https://vessi.com/products/mens-weekend-slip-on-black-white",
          cta: "Shop Weekend Slip-On"
        }
      };

      const state = {
        step: "welcome",
        path: [],
        role: "",
        country: "",
        region: "",
        answers: {},
        tags: new Set(),
        profile: {},
        contact: {}
      };

      const hidden = Object.fromEntries(new URLSearchParams(location.search));
      const screen = document.getElementById("screen");
      const progressBar = document.getElementById("progressBar");
      const totalCoreSteps = 13;

      function trackEvent(name, props = {}) {
        const event = {
          event: name,
          timestamp: Date.now(),
          source: hidden.utm_source || "",
          campaign: hidden.utm_campaign || "",
          affiliate_id: hidden.affiliate_id || "",
          ...props
        };
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push(event);
        if (location.hostname === "localhost") console.log("[track]", event);
      }

      function render({ kicker, title, prompt, options = [], body = "", actions = "", progress = null, onRendered = null }) {
        const computedProgress = progress == null ? Math.min(96, Math.round((state.path.length / totalCoreSteps) * 100)) : progress;
        progressBar.style.width = `${computedProgress}%`;
        screen.classList.remove("active");
        requestAnimationFrame(() => {
          screen.innerHTML = `
            ${kicker ? `<p class="kicker">${kicker}</p>` : ""}
            <h2>${title}</h2>
            ${prompt ? `<p class="prompt">${prompt}</p>` : ""}
            ${body}
            ${options.length ? `<div class="option-grid">${options.map((option, index) => `
              <button class="option" type="button" data-value="${option.value}" data-tags="${(option.tags || []).join(",")}" data-label="${option.label.replace(/"/g, "&quot;")}">
                <span class="option-key">${String.fromCharCode(65 + index)}</span>
                <span>${option.label}</span>
              </button>
            `).join("")}</div>` : ""}
            ${actions ? `<div class="actions">${actions}</div>` : ""}
          `;
          screen.classList.add("active");
          screen.querySelectorAll(".option").forEach((button) => {
            button.addEventListener("click", () => choose(button.dataset.value, button.dataset.label, button.dataset.tags));
          });
          attachActions();
          const firstButton = screen.querySelector("button, a, input, select");
          if (firstButton) firstButton.focus({ preventScroll: true });
          if (onRendered) onRendered();
        });
      }

      function choose(value, label, tagString) {
        const step = state.step;
        state.answers[step] = { value, label };
        (tagString || "").split(",").filter(Boolean).forEach((tag) => state.tags.add(tag));
        trackEvent("question_answered", { question_id: step, answer: label, role: state.role });
        goNext(value, label);
      }

      function pushStep(step) {
        state.step = step;
        state.path.push(step);
        trackEvent("question_viewed", { question_id: step, role: state.role });
        routes[step]();
      }

      function goNext(value, label) {
        const current = state.step;
        if (current === "welcome") return pushStep("role");
        if (current === "role") {
          state.role = value;
          hidden.role = value;
          return pushStep("country");
        }
        if (current === "country") {
          state.country = value;
          if (value === "other") return showIneligible("This giveaway is only open to eligible US and Canada participants.");
          if (value === "canada") return pushStep("province");
          return pushStep("state");
        }
        if (current === "province") {
          state.region = label;
          if (value === "quebec") return showIneligible("Quebec is excluded from this giveaway, but you can still shop back-to-school Vessi picks.");
          return pushStep("age");
        }
        if (current === "state") {
          state.region = label;
          return pushStep("age");
        }
        if (current === "age") {
          if (value === "under18") return showIneligible("Entrants must be 18 or older.");
          return pushStep(state.role === "student" ? "student_walk" : "teacher_feet");
        }
        if (current === "student_walk") return pushStep("student_rain");
        if (current === "student_rain") return pushStep("student_pain");
        if (current === "student_pain") return pushStep("student_lifestyle");
        if (current === "student_lifestyle") return pushStep("student_intent");
        if (current === "student_intent") return pushStep("student_insight");
        if (current === "teacher_feet") return pushStep("teacher_rain");
        if (current === "teacher_rain") return pushStep("teacher_pain");
        if (current === "teacher_pain") return pushStep("teacher_use");
        if (current === "teacher_use") return pushStep("teacher_intent");
        if (current === "teacher_intent") return pushStep("teacher_insight");
      }

      function button(label, onClick, variant = "primary") {
        return `<button class="${variant}" type="button" data-action="${onClick}">${label}</button>`;
      }

      function attachActions() {
        screen.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.dataset.action;
            if (action === "start") {
              trackEvent("quiz_started");
              pushStep("role");
            }
            if (action === "school") pushStep("school");
            if (action === "contact") submitSchool();
            if (action === "terms") submitContact();
            if (action === "results") submitTerms();
            if (action === "regionContinue") submitRegion();
            if (action === "back") back();
          });
        });
      }

      function back() {
        state.path.pop();
        const previous = state.path.pop() || "welcome";
        pushStep(previous);
      }

      const routes = {
        welcome() {
          render({
            kicker: "Back-to-school giveaway",
            title: "Find your waterproof back-to-school sneaker.",
            prompt: "Answer a few quick questions and we will match you with the Vessi pair built for your school day. Your entry is included when you complete the quiz.",
            body: `
              <div class="footer-trust">
                <span class="trust-pill">Waterproof</span>
                <span class="trust-pill">Lightweight comfort</span>
                <span class="trust-pill">Easy to clean</span>
                <span class="trust-pill">Made for rainy school days</span>
              </div>
              <div class="image-strip" aria-label="Vessi product and lifestyle images">
                <img src="img/weekend-classic-lifestyle.jpg" alt="White Vessi sneakers with water droplets">
                <img src="img/brand-everyday.jpg" alt="Person walking in Vessi sneakers on a rainy city street">
                <img src="img/weekend-neo-lifestyle.jpg" alt="Vessi sneaker stepping through water">
              </div>
            `,
            actions: `${button("Find My Match", "start")}<a class="secondary" href="https://vessi.com/" data-track="cta_clicked" data-track-section="welcome">Shop Vessi</a>`,
            progress: 3
          });
          attachActions();
        },
        role() {
          render({
            kicker: "Step 1",
            title: "Which best describes you?",
            prompt: "We will tailor your recommendation around how you actually move through the school day.",
            options: [
              { value: "student", label: "Student" },
              { value: "teacher", label: "Teacher / education professional" }
            ]
          });
        },
        country() {
          render({
            kicker: "Eligibility",
            title: "Where are you entering from?",
            prompt: "This quick check keeps the giveaway clean before we ask for contact details.",
            options: [
              { value: "us", label: "United States" },
              { value: "canada", label: "Canada" },
              { value: "other", label: "Other" }
            ]
          });
        },
        state() {
          const states = ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Florida", "Georgia", "Illinois", "Massachusetts", "Michigan", "New York", "Oregon", "Pennsylvania", "Texas", "Virginia", "Washington", "Wisconsin"];
          regionSelect("What state are you entering from?", states, "age");
        },
        province() {
          const provinces = ["Alberta", "British Columbia", "Manitoba", "New Brunswick", "Newfoundland and Labrador", "Nova Scotia", "Ontario", "Prince Edward Island", "Quebec", "Saskatchewan", "Yukon"];
          regionSelect("What province are you entering from?", provinces, "age");
        },
        age() {
          render({
            kicker: "Eligibility",
            title: "Are you 18 or older?",
            prompt: "Entrants must be 18+ to qualify for the giveaway.",
            options: [
              { value: "18plus", label: "Yes, I am 18+" },
              { value: "under18", label: "No, I am under 18" }
            ]
          });
        },
        student_walk() {
          render({
            kicker: "Student match",
            title: "On a normal campus day, how much are you walking?",
            options: [
              { value: "under15", label: "Under 15 minutes" },
              { value: "15to30", label: "15-30 minutes" },
              { value: "30to60", label: "30-60 minutes", tags: ["long_walk_student", "comfort_need"] },
              { value: "over60", label: "Over an hour", tags: ["long_walk_student", "comfort_need"] }
            ]
          });
        },
        student_rain() {
          render({
            kicker: "Student match",
            title: "When it rains, what do you usually wear to class?",
            options: [
              { value: "regular", label: "Regular sneakers and hope they survive", tags: ["wet_style_conflict", "waterproof_need"] },
              { value: "white", label: "White sneakers I immediately regret", tags: ["wet_style_conflict", "easy_clean_need"] },
              { value: "boots", label: "Boots, even though they feel bulky", tags: ["bulky_boot_problem", "lightweight_need"] },
              { value: "outfit", label: "Whatever matches my outfit, even if my feet get wet", tags: ["wet_style_conflict", "style_need"] },
              { value: "backup", label: "I bring or change into another pair", tags: ["backup_pair_problem", "one_pair_need"] }
            ]
          });
        },
        student_pain() {
          render({
            kicker: "Student match",
            title: "What is the most annoying part of rainy campus days?",
            options: [
              { value: "socks", label: "Wet socks", tags: ["waterproof_need"] },
              { value: "walks", label: "Long walks in uncomfortable shoes", tags: ["comfort_need"] },
              { value: "dirty", label: "Shoes getting dirty", tags: ["easy_clean_need"] },
              { value: "style", label: "Choosing between style and staying dry", tags: ["style_need"] },
              { value: "carry", label: "Carrying a backup pair", tags: ["one_pair_need"] }
            ]
          });
        },
        student_lifestyle() {
          render({
            kicker: "Student match",
            title: "Your back-to-school shoes need to work for...",
            options: [
              { value: "class", label: "Class and campus walks" },
              { value: "commute", label: "Commuting" },
              { value: "going_out", label: "Going out after class", tags: ["versatility_need", "style_need"] },
              { value: "work", label: "Work or internship days", tags: ["versatility_need"] },
              { value: "everything", label: "Basically everything", tags: ["versatility_need", "one_pair_need"] }
            ]
          });
        },
        student_intent() {
          render({
            kicker: "Purchase timing",
            title: "Are you planning to buy back-to-school shoes soon?",
            options: [
              { value: "active", label: "Yes, I am actively looking", tags: ["high_intent"] },
              { value: "maybe", label: "Maybe, if I find the right pair or deal", tags: ["medium_intent", "deal_sensitive"] },
              { value: "giveaway", label: "Not yet, mostly entering the giveaway", tags: ["low_intent"] }
            ]
          });
        },
        student_insight() {
          const product = recommend();
          renderInsight({
            role: "student",
            title: `Your campus match is ${product.name}.`,
            text: studentInsight(product),
            product,
            next: "school"
          });
        },
        teacher_feet() {
          render({
            kicker: "Teacher match",
            title: "On a normal school day, how long are you on your feet?",
            options: [
              { value: "under4", label: "Under 4 hours" },
              { value: "4to6", label: "4-6 hours" },
              { value: "6to8", label: "6-8 hours", tags: ["high_comfort_need", "comfort_need"] },
              { value: "8plus", label: "8+ hours", tags: ["high_comfort_need", "comfort_need"] }
            ]
          });
        },
        teacher_rain() {
          render({
            kicker: "Teacher match",
            title: "When it rains, what do you usually wear to school?",
            options: [
              { value: "regular", label: "Regular sneakers and hope for the best", tags: ["waterproof_need"] },
              { value: "flats", label: "Flats or loafers that are not really waterproof", tags: ["waterproof_need", "style_need"] },
              { value: "boots", label: "Bulky rain boots I do not want to wear all day", tags: ["bulky_boot_problem", "lightweight_need"] },
              { value: "old", label: "An old pair I do not mind wrecking", tags: ["easy_clean_need"] },
              { value: "backup", label: "I bring a backup pair", tags: ["one_pair_need"] }
            ]
          });
        },
        teacher_pain() {
          render({
            kicker: "Teacher match",
            title: "What tends to go wrong with that option?",
            options: [
              { value: "socks", label: "My socks get damp", tags: ["waterproof_need"] },
              { value: "tired", label: "My feet feel tired", tags: ["comfort_need"] },
              { value: "dirty", label: "My shoes get dirty or gross", tags: ["easy_clean_need"] },
              { value: "clunky", label: "I am stuck wearing clunky rain shoes all day", tags: ["lightweight_need"] },
              { value: "style", label: "I avoid wearing shoes I actually like", tags: ["style_need"] }
            ]
          });
        },
        teacher_use() {
          render({
            kicker: "Teacher match",
            title: "Where do your shoes need to hold up?",
            options: [
              { value: "commute", label: "Rainy commutes", tags: ["waterproof_need"] },
              { value: "hallway", label: "Classroom and hallway duty", tags: ["comfort_need"] },
              { value: "recess", label: "Recess or outdoor supervision", tags: ["easy_clean_school", "easy_clean_need"] },
              { value: "spills", label: "Spills and messy floors", tags: ["easy_clean_school", "easy_clean_need"] },
              { value: "errands", label: "School day and after-school errands", tags: ["versatility_need"] }
            ]
          });
        },
        teacher_intent() {
          render({
            kicker: "Purchase timing",
            title: "Are you considering new school shoes in the next 30 days?",
            options: [
              { value: "yes", label: "Yes, before or near the start of school", tags: ["high_intent"] },
              { value: "maybe", label: "Maybe, if the fit or deal is right", tags: ["medium_intent", "deal_sensitive"] },
              { value: "later", label: "Not right now", tags: ["low_intent"] }
            ]
          });
        },
        teacher_insight() {
          const product = recommend();
          renderInsight({
            role: "teacher",
            title: `Your school-day match is ${product.name}.`,
            text: teacherInsight(product),
            product,
            next: "school"
          });
        },
        school() {
          const label = state.role === "student" ? "School / institution name" : "School / education center";
          render({
            kicker: "Entry details",
            title: state.role === "student" ? "What school are you repping?" : "What school should your entry count toward?",
            prompt: "This helps count entries toward school and community prize tracking.",
            body: `
              <div class="form-grid">
                <div class="field full">
                  <label for="schoolName">${label}</label>
                  <input id="schoolName" name="schoolName" autocomplete="organization" required>
                </div>
              </div>
              <p class="error" id="formError"></p>
            `,
            actions: `${button("Continue", "contact")}${button("Back", "back", "ghost")}`
          });
          attachActions();
        },
        contact() {
          render({
            kicker: "Entry details",
            title: "Where should we send your entry confirmation?",
            prompt: "We will also send your personalized Vessi match so you can find it again.",
            body: `
              <div class="form-grid">
                <div class="field">
                  <label for="firstName">First name</label>
                  <input id="firstName" name="firstName" autocomplete="given-name" required>
                </div>
                <div class="field">
                  <label for="lastName">Last name</label>
                  <input id="lastName" name="lastName" autocomplete="family-name" required>
                </div>
                <div class="field full">
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" autocomplete="email" required>
                </div>
                <div class="field full">
                  <label for="phone">Phone, optional</label>
                  <input id="phone" name="phone" type="tel" autocomplete="tel">
                </div>
              </div>
              <label class="checkbox-row">
                <input id="smsOptIn" type="checkbox">
                <span>Send me winner/result reminders by SMS. Message and data rates may apply. This is optional.</span>
              </label>
              <p class="error" id="formError"></p>
            `,
            actions: `${button("Continue", "terms")}${button("Back", "back", "ghost")}`
          });
          attachActions();
        },
        terms() {
          render({
            kicker: "Last step",
            title: "Accept the giveaway terms?",
            prompt: "By entering, you confirm that your information is accurate and that you meet the campaign eligibility requirements.",
            body: `
              <label class="checkbox-row">
                <input id="termsCheck" type="checkbox">
                <span>I accept the <a href="https://vessi.com/pages/terms-conditions" target="_blank" rel="noopener">giveaway terms and conditions</a>.</span>
              </label>
              <p class="mini-note">Swap this link for the final 2026 back-to-school giveaway terms before launch.</p>
              <p class="error" id="formError"></p>
            `,
            actions: `${button("See My Result", "results")}${button("Back", "back", "ghost")}`
          });
          attachActions();
        },
        results() {
          renderResult();
        }
      };

      function regionSelect(title, options) {
        render({
          kicker: "Eligibility",
          title,
          prompt: "Select your region so we can confirm giveaway eligibility.",
          body: `
            <div class="form-grid">
              <div class="field full">
                <label for="regionSelect">Region</label>
                <select id="regionSelect" required>
                  <option value="">Choose one</option>
                  ${options.map((option) => `<option value="${option.toLowerCase().replace(/[^a-z0-9]+/g, "-")}">${option}</option>`).join("")}
                </select>
              </div>
            </div>
            <p class="error" id="formError"></p>
          `,
          actions: `${button("Continue", "regionContinue")}${button("Back", "back", "ghost")}`
        });
      }

      function submitRegion() {
        const select = document.getElementById("regionSelect");
        if (!select || !select.value) return setError("Choose a region to continue.");
        state.answers[state.step] = { value: select.value, label: select.options[select.selectedIndex].text };
        goNext(select.value, select.options[select.selectedIndex].text);
      }

      function renderInsight({ title, text, product }) {
        render({
          kicker: "Your match preview",
          title,
          prompt: text,
          body: `
            <div class="insight-card">
              <div>
                <strong>${product.short}</strong>
                <p>${microProof()}</p>
              </div>
              <img src="${product.image}" alt="${product.name} waterproof sneaker">
            </div>
          `,
          actions: `${button("Continue to Entry", "school")}${button("Back", "back", "ghost")}`
        });
        attachActions();
      }

      function submitSchool() {
        const school = document.getElementById("schoolName").value.trim();
        if (!school) return setError("Add a school or institution name to continue.");
        state.profile.school = school;
        pushStep("contact");
      }

      function submitContact() {
        const first = document.getElementById("firstName").value.trim();
        const last = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const smsOptIn = document.getElementById("smsOptIn").checked;
        if (!first || !last || !email) return setError("First name, last name, and email are required.");
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return setError("Enter a valid email address.");
        state.contact = { first, last, email, phone, smsOptIn };
        trackEvent("lead_captured", { role: state.role, email_domain: email.split("@")[1] || "" });
        pushStep("terms");
      }

      function submitTerms() {
        if (!document.getElementById("termsCheck").checked) return setError("Accept the terms to complete your entry.");
        progressBar.style.width = "100%";
        trackEvent("quiz_completed", summary());
        pushStep("results");
      }

      function setError(message) {
        const error = document.getElementById("formError");
        if (error) error.textContent = message;
      }

      function recommend() {
        const tags = state.tags;
        if (tags.has("comfort_need") || tags.has("high_comfort_need") || tags.has("long_walk_student")) return products.neo;
        if (tags.has("one_pair_need") || tags.has("backup_pair_problem")) return products.slip;
        if (tags.has("easy_clean_need") || tags.has("easy_clean_school")) return products.neo;
        return products.classic;
      }

      function painLine() {
        const tags = state.tags;
        if (tags.has("comfort_need") || tags.has("high_comfort_need")) return "lightweight support for long days on your feet";
        if (tags.has("easy_clean_need") || tags.has("easy_clean_school")) return "easy-clean waterproof protection for spills, puddles, and messy weather";
        if (tags.has("one_pair_need")) return "one pair that works from commute to class to after-school plans";
        if (tags.has("style_need") || tags.has("wet_style_conflict")) return "waterproof protection without giving up your everyday sneaker look";
        return "dry socks and everyday comfort when the weather turns";
      }

      function microProof() {
        if (state.role === "teacher") return "Built for rainy commutes, wet floors, recess duty, and full days when regular shoes do not cut it.";
        return "Built for rainy campus walks, class, errands, and the outfits you actually want to wear.";
      }

      function studentInsight(product) {
        if (product === products.neo) return "Your answers point to long walks and comfort as the real problem. You need waterproof sneakers that can handle campus mileage, not just rain.";
        if (product === products.slip) return "Your answers point to convenience and one-pair versatility. You need a waterproof sneaker that is easy to wear, easy to repeat, and simple to clean.";
        return "Your answers point to the classic campus tradeoff: stay dry or look good. You need a waterproof sneaker that still looks like an everyday sneaker.";
      }

      function teacherInsight(product) {
        if (product === products.neo) return "Your answers point to full-day comfort. You need a waterproof sneaker that handles standing, hallway movement, rainy commutes, and after-school errands.";
        if (product === products.slip) return "Your answers point to easy daily use. You need a waterproof sneaker that is quick to wear and reliable when the school day gets messy.";
        return "Your answers point to rainy-day style and dry feet. You need waterproof protection without being stuck in bulky rain boots all day.";
      }

      function intentBucket() {
        if (state.tags.has("high_intent")) return "high_intent";
        if (state.tags.has("medium_intent") || state.tags.has("deal_sensitive")) return "medium_intent";
        return "low_intent";
      }

      function resultCopy(product) {
        const rolePhrase = state.role === "teacher" ? "school-day" : "campus";
        const urgency = intentBucket() === "high_intent"
          ? `Want your pair before classes start? Shop your match now. Your giveaway entry stays active.`
          : intentBucket() === "medium_intent"
            ? `Save your match and compare it when you are ready. This page is built around the reason you chose: ${painLine()}.`
            : `You are entered. If the weather turns before winners are announced, your match is ready.`;
        return {
          headline: `You are entered. Your ${rolePhrase} match is ${product.name}.`,
          body: `Based on your answers, you need ${painLine()}. ${product.name} is built for ${state.role === "teacher" ? "long school days, rainy commutes, wet floors, and classroom movement" : "rainy campus days, class, errands, and everyday outfits"}.`,
          urgency
        };
      }

      function renderResult() {
        const product = recommend();
        const copy = resultCopy(product);
        hidden.recommended_product = product.name;
        hidden.intent_bucket = intentBucket();
        const ctaUrl = `${product.url}?utm_source=${encodeURIComponent(hidden.utm_source || "quiz")}&utm_campaign=${encodeURIComponent(hidden.utm_campaign || "bts-quiz")}&utm_content=${encodeURIComponent(state.role + "-" + intentBucket())}&affiliate_id=${encodeURIComponent(hidden.affiliate_id || "")}`;

        render({
          kicker: "Result ready",
          title: copy.headline,
          prompt: copy.body,
          body: `
            <div class="result-layout">
              <div>
                <div class="result-card">
                  <p class="result-name">${product.name}</p>
                  <p class="mini-note">${product.short}</p>
                  <ul class="benefit-list">
                    <li>${painLine()}</li>
                    <li>${microProof()}</li>
                    <li>${copy.urgency}</li>
                  </ul>
                </div>
                <div class="profile-card">
                  <strong>Your quiz profile</strong>
                  <div class="profile-grid">
                    <div class="profile-item"><strong>Role</strong><span>${state.role === "teacher" ? "Teacher / education professional" : "Student"}</span></div>
                    <div class="profile-item"><strong>Intent</strong><span>${intentBucket().replace("_", " ")}</span></div>
                    <div class="profile-item"><strong>Region</strong><span>${state.country === "us" ? "United States" : "Canada"} / ${state.region}</span></div>
                    <div class="profile-item"><strong>School</strong><span>${state.profile.school}</span></div>
                  </div>
                </div>
              </div>
              <div class="result-card">
                <img class="product-art" src="${product.image}" alt="${product.name} waterproof sneaker">
                <img class="lifestyle-art" src="${product.lifestyle}" alt="${product.name} lifestyle image">
                <p class="result-name">${product.name}</p>
                <p class="mini-note">${product.short}</p>
              </div>
            </div>
          `,
          actions: `
            <a class="primary" href="${ctaUrl}" data-track="cta_clicked" data-track-section="results" data-track-text="Shop My Match">Shop My Match</a>
            <a class="secondary" href="https://vessi.com/" data-track="cta_clicked" data-track-section="results" data-track-text="Share With My School">Share With My School</a>
            ${button("Start Over", "restart", "ghost")}
          `,
          progress: 100,
          onRendered() {
            screen.querySelector('[data-action="restart"]').addEventListener("click", () => location.reload());
            screen.querySelectorAll("[data-track]").forEach((el) => {
              el.addEventListener("click", () => trackEvent(el.dataset.track, {
                section: el.dataset.trackSection,
                text: el.dataset.trackText,
                recommended_product: product.name,
                intent_bucket: intentBucket()
              }));
            });
            trackEvent("results_viewed", summary());
          }
        });
      }

      function showIneligible(reason) {
        hidden.eligibility_status = "ineligible";
        render({
          kicker: "Eligibility",
          title: "You are outside the giveaway rules.",
          prompt: reason,
          body: `
            <div class="insight-card">
              <div>
                <strong>You can still shop waterproof back-to-school picks.</strong>
                <p>We screened eligibility first so you do not spend time completing an entry that cannot qualify.</p>
              </div>
              <img src="img/weekend-classic.png" alt="Weekend Classic waterproof sneaker">
            </div>
          `,
          actions: `<a class="primary" href="https://vessi.com/">Shop Vessi</a>${button("Start Over", "restart", "ghost")}`,
          progress: 100,
          onRendered() {
            screen.querySelector('[data-action="restart"]').addEventListener("click", () => location.reload());
            trackEvent("ineligible_viewed", { reason });
          }
        });
      }

      function summary() {
        const product = recommend();
        return {
          role: state.role,
          region: state.region,
          school: state.profile.school,
          tags: Array.from(state.tags),
          intent_bucket: intentBucket(),
          recommended_product: product.name,
          hidden
        };
      }

      routes.welcome();
    </script>
  </body>
</html>
