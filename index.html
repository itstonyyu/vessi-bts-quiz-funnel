<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Find your 100% waterproof Vessi match and enter the back-to-school giveaway.">
    <title>Vessi back-to-school match quiz</title>
    <!-- Meta Pixel Code -->
    <script>

    <style>
      /* These files are the exact production assets published by vessi.com. */
      @font-face {
        font-family: 'Noi Grotesk';
        src: url('./fonts/NoiGrotesk-Regular.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: 'Noi Grotesk';
        src: url('./fonts/NoiGrotesk-Medium.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 500;
      }

      @font-face {
        font-family: 'ABCDiatypeMono';
        src: url('./fonts/ABCDiatypeMono-Regular.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      :root {
        --vessi-blue: #0069F0;
        --vessi-ink: #28201A;
        --vessi-white: #FFFFFF;
        --vessi-border: #E6E6E6;
        --vessi-grey: #D8D8D8;
        --vessi-bone: #F4F0E9;
        --vessi-sky: #4D96F5;
        --vessi-scrim: rgba(85, 83, 70, 0.5);
        --muted-ink: rgba(40, 32, 26, 0.7);
        --shadow: 0 24px 80px rgba(40, 32, 26, 0.14);
        --card-radius: 25px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--vessi-white);
        color: var(--vessi-ink);
        font-family: 'Noi Grotesk', Arial, sans-serif;
        font-weight: 400;
        letter-spacing: 0;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: var(--vessi-white);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button,
      a,
      label {
        font-weight: 500;
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--vessi-blue);
        outline-offset: 2px;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: minmax(280px, 0.88fr) minmax(420px, 1.12fr);
      }

      /* Campaign art belongs to the start screen only. Once the quiz is
         underway, give the questionnaire the full viewport on every device. */
      .shell.quiz-started {
        grid-template-columns: minmax(0, 1fr);
      }

      .shell.quiz-started .brand-panel {
        display: none;
      }

      .shell.quiz-started .quiz-panel {
        min-height: 100dvh;
        padding: clamp(24px, 5vw, 64px);
      }

      .shell.quiz-started .quiz-card {
        width: min(100%, 840px);
      }

      .shell.quiz-started .screen {
        min-height: min(620px, calc(100dvh - clamp(48px, 10vw, 128px)));
      }

      .shell:not(.quiz-started) .screen {
        min-height: min(620px, calc(100dvh - 112px));
      }

      /* The campaign panel already supplies the landing imagery. Avoid a
         second gallery making the start action fall below the viewport. */
      .shell:not(.quiz-started) .image-strip {
        display: none;
      }

      .brand-panel {
        position: relative;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        overflow: hidden;
        background: var(--vessi-blue);
        color: var(--vessi-white);
      }

      .brand-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent, var(--vessi-scrim));
        pointer-events: none;
      }

      .brand-top,
      .brand-media,
      .brand-bottom {
        position: relative;
        z-index: 1;
      }

      .brand-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .logo {
        font-size: 16px;
        font-weight: 500;
      }

      .campaign-pill {
        border: 1px solid var(--vessi-sky);
        border-radius: 9999px;
        padding: 8px 12px;
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-media {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: 1fr;
        gap: 14px;
        min-height: 0;
        margin-top: 42px;
      }

      .media-card {
        position: relative;
        min-height: 0;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        border: 1px solid var(--vessi-sky);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
      }

      .media-card.large {
        grid-row: auto;
      }

      .media-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .media-card.product {
        display: grid;
        place-items: center;
        background: var(--vessi-white);
      }

      .media-card.product img {
        width: auto;
        height: auto;
        max-width: 90%;
        max-height: 80%;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(40, 32, 26, 0.18));
      }

      .media-caption {
        position: absolute;
        left: 12px;
        bottom: 12px;
        border-radius: 9999px;
        padding: 7px 10px;
        background: var(--vessi-scrim);
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .brand-bottom {
        margin-top: auto;
        padding-top: 32px;
      }

      .brand-bottom h1 {
        max-width: 560px;
        margin: 0 0 16px;
        font-size: clamp(44px, 6vw, 72px);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .brand-bottom p {
        max-width: 470px;
        margin: 0;
        color: var(--vessi-white);
        font-size: 17px;
        line-height: 1.55;
      }

      .quiz-panel {
        min-height: 100dvh;
        display: grid;
        align-items: center;
        padding: 48px;
        background: var(--vessi-white);
      }

      .quiz-card {
        width: min(100%, 760px);
        margin: 0 auto;
        background: var(--vessi-white);
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .progress-wrap {
        height: 8px;
        background: var(--vessi-grey);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: var(--vessi-blue);
        transition: width 320ms ease;
      }

      .screen {
        display: none;
        min-height: 620px;
        padding: 40px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
        animation: rise 220ms ease both;
      }

      @keyframes rise {
        from {
          opacity: 0.01;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kicker {
        margin: 0 0 16px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 1.3;
        text-transform: uppercase;
      }

      h2 {
        margin: 0;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: 0;
      }

      /* Question headings receive programmatic focus so screen readers announce
         each step; they are not interactive, so a visible focus ring is noise. */
      #screen h2:focus {
        outline: none;
      }

      .prompt {
        margin: 18px 0 0;
        max-width: 610px;
        color: var(--muted-ink);
        font-size: 18px;
        line-height: 1.55;
      }

      /* Question assets are pre-composed at 40:11. Preserve that full frame so
         footwear and context are never lost to runtime cropping. */
      .question-accent {
        width: 100%;
        height: auto;
        aspect-ratio: 40 / 11;
        margin: 18px 0 0;
        overflow: hidden;
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
      }

      .question-accent img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 32px;
      }

      .option {
        min-height: 78px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        padding: 16px;
        background: var(--vessi-white);
        color: var(--vessi-ink);
        text-align: left;
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .option:hover {
        border-color: var(--vessi-blue);
        background: var(--vessi-white);
        transform: translateY(-1px);
      }

      .option-key {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--vessi-blue);
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
      }

      .option span:last-child {
        font-weight: 500;
        line-height: 1.3;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: auto;
        padding-top: 36px;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        border-radius: 9999px;
        padding: 0 20px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-decoration: none;
      }

      .primary {
        border: 1px solid var(--vessi-blue);
        background: var(--vessi-blue);
        color: var(--vessi-white);
      }

      .secondary {
        border: 1px solid var(--vessi-border);
        background: var(--vessi-white);
        color: var(--vessi-ink);
      }

      .ghost {
        min-height: 44px;
        border: 0;
        padding: 0 12px;
        background: transparent;
        color: var(--muted-ink);
        font-weight: 500;
      }

      .back-control {
        width: fit-content;
        min-width: 72px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: -8px 0 18px -12px;
        border: 0;
        border-radius: 9999px;
        padding: 0 12px;
        background: transparent;
        color: var(--muted-ink);
        font-weight: 500;
      }

      .back-control:hover {
        background: var(--vessi-grey);
        color: var(--vessi-ink);
      }

      .option.is-selected {
        border-color: var(--vessi-blue);
        box-shadow: inset 0 0 0 1px var(--vessi-blue);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 30px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted-ink);
        font-size: 13px;
        font-weight: 500;
      }

      input,
      select {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--vessi-border);
        border-radius: 9999px;
        padding: 0 14px;
        background: var(--vessi-white);
        color: var(--vessi-ink);
      }

      input:focus-visible,
      select:focus-visible {
        border-color: var(--vessi-blue);
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted-ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .checkbox-row input {
        width: 18px;
        min-height: 18px;
        margin-top: 1px;
      }

      .mini-note {
        margin-top: 10px;
        color: var(--muted-ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .insight-card {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 24px;
        align-items: center;
        margin-top: 28px;
        border: 1px solid var(--vessi-sky);
        border-left: 5px solid var(--vessi-blue);
        border-radius: var(--card-radius);
        padding: 20px;
        background: var(--vessi-white);
      }

      .insight-card p {
        margin: 8px 0 0;
        color: var(--muted-ink);
        line-height: 1.5;
      }

      .insight-card img {
        width: 100%;
        max-width: 180px;
        justify-self: center;
        filter: drop-shadow(0 18px 24px rgba(40, 32, 26, 0.16));
      }

      .result-layout {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 28px;
        align-items: start;
        margin-top: 24px;
      }

      .result-card,
      .profile-card {
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
        padding: 18px;
      }

      .product-art {
        width: 100%;
        max-width: 240px;
        display: block;
        margin: 0 auto 12px;
        filter: drop-shadow(0 18px 28px rgba(40, 32, 26, 0.18));
      }

      .lifestyle-art {
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-top: 14px;
        border-radius: var(--card-radius);
        object-fit: contain;
        display: block;
      }

      .result-name {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 500;
      }

      .result-eyebrow {
        margin: 0 0 10px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .result-visuals {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .result-complete {
        margin: 20px 0 0;
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(0, 105, 240, 0.08);
        color: var(--vessi-ink);
        font-size: 14px;
        line-height: 1.45;
      }

      .result-inline-cta {
        width: fit-content;
        margin-top: 18px;
      }

      .benefit-list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .benefit-list li {
        display: flex;
        gap: 10px;
        color: var(--muted-ink);
        line-height: 1.45;
      }

      .benefit-list li::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        margin-top: 8px;
        border-radius: 50%;
        background: var(--vessi-blue);
      }

      .profile-card {
        margin-top: 18px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .profile-item {
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
        padding: 12px;
      }

      .profile-item strong {
        display: block;
        margin-bottom: 4px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .profile-item span {
        color: var(--muted-ink);
        font-size: 14px;
        line-height: 1.35;
      }

      .error {
        min-height: 18px;
        margin-top: 14px;
        color: var(--vessi-ink);
        font-size: 14px;
        font-weight: 500;
      }

      .footer-trust {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .image-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .image-strip img {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: var(--card-radius);
        object-fit: contain;
        display: block;
      }

      .trust-pill {
        border-radius: 999px;
        border: 1px solid var(--vessi-border);
        padding: 8px 11px;
        color: var(--muted-ink);
        font-size: 12px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.56);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      @media (min-width: 1025px) and (max-height: 800px) {
        .shell:not(.quiz-started) .brand-panel {
          padding: 24px;
        }

        .shell:not(.quiz-started) .brand-media {
          grid-template-rows: 1fr;
          flex: 0 0 auto;
          min-height: 0;
          height: auto;
          margin-top: 20px;
        }

        .shell:not(.quiz-started) .media-card {
          min-height: 0;
        }

        .shell:not(.quiz-started) .brand-bottom {
          padding-top: 20px;
        }

        .shell:not(.quiz-started) .brand-bottom h1 {
          margin-bottom: 10px;
          font-size: 48px;
        }

        .shell:not(.quiz-started) .brand-bottom p {
          font-size: 14px;
          line-height: 1.4;
        }

        .shell:not(.quiz-started) .screen {
          padding: 30px;
        }

        .shell:not(.quiz-started) .screen h2 {
          font-size: 42px;
        }

        .shell:not(.quiz-started) .prompt {
          margin-top: 12px;
          font-size: 16px;
        }

        .shell:not(.quiz-started) .actions {
          padding-top: 24px;
        }
      }

      /* On short desktop windows, protect answer and result CTA visibility over decoration. */
      @media (min-width: 1025px) and (max-height: 760px) {
        .shell.quiz-started .question-accent,
        .shell[data-step="results"] .lifestyle-art {
          display: none;
        }

        .shell[data-step="results"] .screen {
          min-height: auto;
          padding: 24px;
        }

        .shell[data-step="results"] h2 {
          font-size: 42px;
        }

        .shell[data-step="results"] .prompt {
          margin-top: 10px;
          font-size: 16px;
        }

        .shell[data-step="results"] .result-layout {
          margin-top: 18px;
        }

        .shell[data-step="results"] .result-card {
          padding: 18px;
        }

        .shell[data-step="results"] .actions {
          padding-top: 10px;
        }
      }

      @media (max-width: 1024px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .brand-panel {
          min-height: 430px;
        }

        .brand-bottom h1 {
          font-size: clamp(40px, 8vw, 72px);
        }

        .quiz-panel {
          min-height: auto;
          padding: 28px;
        }
      }

      @media (max-width: 720px) {
        .brand-panel {
          min-height: auto;
          padding: 20px;
        }

        .brand-media {
          min-height: 0;
          margin-top: 28px;
        }

        .shell:not(.quiz-started) .brand-media {
          min-height: 0;
          margin-top: 16px;
        }

        .shell:not(.quiz-started) .brand-bottom {
          padding-top: 18px;
        }

        .shell:not(.quiz-started) .brand-bottom h1 {
          margin-bottom: 10px;
          font-size: 34px;
        }

        .shell:not(.quiz-started) .brand-bottom p {
          font-size: 14px;
          line-height: 1.4;
        }

        .brand-bottom p {
          font-size: 15px;
        }

        .brand-bottom h1 {
          font-size: 42px;
          line-height: 1.2;
        }

        .quiz-panel {
          padding: 16px;
        }

        .shell:not(.quiz-started) .quiz-panel {
          padding: 12px 12px 16px;
        }

        .shell:not(.quiz-started) .screen {
          min-height: auto;
          padding: 22px 20px;
        }

        .shell:not(.quiz-started) .screen h2,
        .shell:not(.quiz-started) .screen .prompt {
          /* The adjacent hero carries the landing heading and description. */
          display: none;
        }

        .shell:not(.quiz-started) .actions {
          padding-top: 22px;
        }

        .screen {
          min-height: 620px;
          padding: 28px 20px;
        }

        .shell.quiz-started .quiz-panel {
          min-height: 100dvh;
          align-items: start;
          padding: 12px;
        }

        .shell.quiz-started .quiz-card {
          min-height: calc(100dvh - 24px);
          box-shadow: 0 12px 40px rgba(40, 32, 26, 0.1);
        }

        .shell.quiz-started .screen {
          min-height: calc(100dvh - 32px);
          padding: clamp(22px, 5.5vw, 30px) clamp(18px, 5vw, 24px);
        }

        .shell.quiz-started h2 {

        .shell.quiz-started .prompt {

        .shell.quiz-started .question-accent {

        .option-grid,
        .form-grid,
        .result-layout,
        .profile-grid {
          grid-template-columns: 1fr;
        }

        .insight-card {
          grid-template-columns: 1fr;
        }

        .insight-card img {
          max-width: 150px;
        }
      }

      @media (max-width: 420px) {
        .brand-panel {
          min-height: auto;
        }

        .brand-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .campaign-pill {
          white-space: normal;
        }

        h2 {
          font-size: 34px;
        }

        .prompt {
          font-size: 16px;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .primary,
        .secondary,
        .ghost {
          width: 100%;
        }

        .image-strip {
          grid-template-columns: 1fr;
        }

        .shell.quiz-started .kicker {
          margin-bottom: 10px;
        }

        .shell:not(.quiz-started) .brand-top {
          align-items: center;
          flex-direction: row;
        }

        .shell:not(.quiz-started) .brand-media {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          grid-template-rows: 130px;
          min-height: 130px;
          gap: 8px;
        }

        .shell:not(.quiz-started) .media-card {
          min-height: 0;
        }

        .shell:not(.quiz-started) .media-card.large {
          grid-row: auto;
        }

        .shell.quiz-started .actions {
          gap: 8px;
        }
      }

  <body>

    src="https://www.facebook.com/tr?id=371015920001593&ev=PageView&noscript=1"
    /></noscript>
    <main class="shell" data-view="landing">
      <aside class="brand-panel" aria-label="Vessi back-to-school campaign">
        <div class="brand-top">
          <div class="logo">Vessi</div>
          <div class="campaign-pill">Back-to-school match quiz</div>
        </div>
        <div class="brand-media" aria-hidden="true">
          <div class="media-card large">
            <img src="img/brand-work.jpg" alt="">
            <span class="media-caption">Weather-Free</span>
          </div>
          <div class="media-card">
            <img src="img/weekend-neo-lifestyle.jpg" alt="">
            <span class="media-caption">Waterproof knit</span>
          </div>
          <div class="media-card product">
            <img src="img/weekend-classic.png" alt="">
            <span class="media-caption">Everyday sneaker</span>
          </div>
        </div>
        <div class="brand-bottom">
          <h1>Find your back-to-school Vessi match.</h1>
          <p>Answer five quick match questions, then complete your giveaway entry.</p>
        </div>
      </aside>

      <section class="quiz-panel">
        <div class="quiz-card" aria-live="polite">
          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div id="screen" class="screen active"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./quiz-config.js"></script>
    <script type="module">
      import { createSheetsSync } from "./src/sheets-sync.js";
      import { addAttributionToUrl, createInstrumentation } from "./src/instrumentation.js";

      const products = {
        classic: {
          name: "Women's Weekend Classic — Marble White",
          short: "100% waterproof sneaker",
          image: "img/weekend-classic.png",
          lifestyle: "img/weekend-classic-lifestyle.jpg",
          url: "https://vessi.com/products/womens-weekend-classic-marble-white",
          cta: "Shop Weekend Classic"
        },
        neo: {
          name: "Men's Weekend Neo — Black/White",
          short: "100% waterproof sneaker",
          image: "img/weekend-neo.png",
          lifestyle: "img/weekend-neo-lifestyle.jpg",
          url: "https://vessi.com/products/mens-weekend-neo-black-white",
          cta: "Shop Weekend Neo"
        },
        slip: {
          name: "Men's Weekend Slip-On — Black/White",
          short: "100% waterproof sneaker",
          image: "img/weekend-slip-on.png",
          lifestyle: "img/brand-everyday.jpg",
          url: "https://vessi.com/products/mens-weekend-slip-on-black-white",
          cta: "Shop Weekend Slip-On"
        }
      };

      const state = {
        step: "welcome",
        path: [],
        role: "",
        country: "",
        region: "",
        answers: {},
        tags: new Set(),
        profile: {},
        contact: {},
        marketing_consent: false,
        consent_date: "",
        terms_accepted: false,
        entry_completed_at: ""
      };

      const hidden = Object.fromEntries(new URLSearchParams(location.search));
      const screen = document.getElementById("screen");
      const progressBar = document.getElementById("progressBar");
      const shell = document.querySelector(".shell");
      const brandPanel = document.querySelector(".brand-panel");
      const totalCoreSteps = 13;
      const quizConfig = window.VESSI_QUIZ_CONFIG || {};
      const syncEndpoint = quizConfig.googleSheetsEndpoint || import.meta.env.VITE_GOOGLE_SHEETS_ENDPOINT || "";
      const quizSync = createSheetsSync({ endpoint: syncEndpoint, getSnapshot: () => state });
      const analytics = createInstrumentation({
        target: window,
        config: quizConfig,
        entry: quizSync.entry,
        logger: location.hostname === "localhost" ? (name, properties) => console.log("[track]", name, properties) : null
      });
      analytics.initialize();
      screen.addEventListener("click", (event) => {
        const link = event.target.closest?.("[data-track]");
        if (!link) return;
        const product = state.step === "results" ? recommend() : null;
        trackEvent("product_clicked", {
          section: link.dataset.trackSection || "",
          text: link.dataset.trackText || link.textContent.trim(),
          recommended_product: product?.name || "",
          intent_bucket: state.role ? intentBucket() : ""
        });
        if (product) void analytics.persistCartAttribution({ role: state.role, recommendation: product.name, intent_bucket: intentBucket() });
      });

      function syncUpdate() {
        quizSync.schedule();
      }

      function rebuildTags() {
        state.tags = new Set(Object.values(state.answers).flatMap((answer) => answer.tags || []));
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (character) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
        })[character]);
      }

      function trackEvent(name, props = {}, options = {}) {
        return analytics.track(name, {
          source: hidden.utm_source || "",
          affiliate_id: hidden.affiliate_id || "",
          ...props
        }, options);
      }

      function render({ kicker, title, prompt, media = null, mediaClass = "", options = [], body = "", actions = "", progress = null, onRendered = null }) {
        const isLanding = state.step === "welcome";
        shell.classList.toggle("quiz-started", !isLanding);
        shell.dataset.view = isLanding ? "landing" : "quiz";
        shell.dataset.step = state.step;
        brandPanel.setAttribute("aria-hidden", String(!isLanding));
        brandPanel.inert = !isLanding;
        const computedProgress = progress == null ? Math.min(96, Math.round((state.path.length / totalCoreSteps) * 100)) : progress;
        const selectedValue = state.answers[state.step]?.value || "";
        const showInlineBack = !isLanding && state.step !== "results" && state.path.length > 1 && !actions.includes('data-action="back"');
        progressBar.style.width = `${computedProgress}%`;
        screen.classList.remove("active");
        requestAnimationFrame(() => {
          screen.innerHTML = `
            ${showInlineBack ? `<button class="back-control" type="button" data-action="back" aria-label="Go back to the previous step">← Back</button>` : ""}
            ${kicker ? `<p class="kicker">${kicker}</p>` : ""}
            <h2 tabindex="-1">${title}</h2>
            ${prompt ? `<p class="prompt">${prompt}</p>` : ""}
            ${media ? `<figure class="question-accent ${mediaClass}" aria-hidden="true"><img src="${media}" alt="" loading="lazy" decoding="async"></figure>` : ""}
            ${body}
            ${options.length ? `<div class="option-grid">${options.map((option, index) => `
              <button class="option ${selectedValue === option.value ? "is-selected" : ""}" type="button" data-value="${option.value}" data-tags="${(option.tags || []).join(",")}" data-label="${option.label.replace(/"/g, "&quot;")}" aria-pressed="${selectedValue === option.value}">
                <span class="option-key">${String.fromCharCode(65 + index)}</span>
                <span>${option.label}</span>
              </button>
            `).join("")}</div>` : ""}
            ${actions ? `<div class="actions">${actions}</div>` : ""}
          `;
          screen.classList.add("active");
          if (!isLanding) window.scrollTo({ top: 0, left: 0, behavior: "instant" });
          screen.querySelectorAll(".option").forEach((button) => {
            button.addEventListener("click", () => choose(button.dataset.value, button.dataset.label, button.dataset.tags));
          });
          attachActions();
          const heading = screen.querySelector("h2");
          if (heading) heading.focus({ preventScroll: true });
          if (onRendered) onRendered();
        });
      }

      function choose(value, label, tagString) {
        const step = state.step;
        Object.keys(state.answers).filter((key) => !state.path.includes(key)).forEach((key) => delete state.answers[key]);
        state.answers[step] = { value, label, tags: (tagString || "").split(",").filter(Boolean) };
        rebuildTags();
        trackEvent("quiz_answered", { question_id: step, answer: label, role: state.role });
        goNext(value, label);
        syncUpdate();
      }

      function pushStep(step) {
        state.step = step;
        state.path.push(step);
        routes[step]();
      }

      function goNext(value, label) {
        const current = state.step;
        if (current === "welcome") return pushStep("role");
        if (current === "role") {
          state.role = value;
          hidden.role = value;
          return pushStep("country");
        }
        if (current === "country") {
          state.country = value;
          if (value === "other") return showIneligible("Entries are currently open to eligible participants in the United States and Canada.");
          if (value === "canada") return pushStep("province");
          return pushStep("state");
        }
        if (current === "province") {
          state.region = label;
          if (value === "quebec") return showIneligible("Quebec isn’t included in this giveaway.");
          return pushStep("age");
        }
        if (current === "state") {
          state.region = label;
          return pushStep("age");
        }
        if (current === "age") {
          if (value === "under18") return showIneligible("Entrants must be 18 or older.");
          return pushStep(state.role === "student" ? "student_walk" : "teacher_feet");
        }
        if (current === "student_walk") return pushStep("student_rain");
        if (current === "student_rain") return pushStep("student_pain");
        if (current === "student_pain") return pushStep("student_lifestyle");
        if (current === "student_lifestyle") return pushStep("student_intent");
        if (current === "student_intent") return pushStep("student_insight");
        if (current === "teacher_feet") return pushStep("teacher_rain");
        if (current === "teacher_rain") return pushStep("teacher_pain");
        if (current === "teacher_pain") return pushStep("teacher_use");
        if (current === "teacher_use") return pushStep("teacher_intent");
        if (current === "teacher_intent") return pushStep("teacher_insight");
      }

      function button(label, onClick, variant = "primary") {
        return `<button class="${variant}" type="button" data-action="${onClick}">${label}</button>`;
      }

      function attachActions() {
        screen.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.dataset.action;
            if (action === "start") {
              trackEvent("quiz_started", {}, { once: true });
              syncUpdate();
              pushStep("role");
            }
            if (action === "school") pushStep("school");
            if (action === "contact") submitSchool();
            if (action === "terms") submitContact();
            if (action === "results") submitTerms();
            if (action === "regionContinue") submitRegion();
            if (action === "back") back();
          });
        });
      }

      function back() {
        const current = state.path.pop();
        delete state.answers[current];
        rebuildTags();
        const previous = state.path.pop() || "welcome";
        pushStep(previous);
        syncUpdate();
      }

      const routes = {
        welcome() {
          render({
            kicker: "Back-to-school giveaway",
            title: "Dress for your day, not the forecast.",
            prompt: "Find your 100% waterproof Vessi match, then complete your back-to-school giveaway entry.",
            body: `
              <div class="footer-trust">
                <span class="trust-pill">100% waterproof</span>
                <span class="trust-pill">Lightweight and breathable</span>
                <span class="trust-pill">365-Day Waterproof Guarantee</span>
                <span class="trust-pill">No purchase necessary</span>
              </div>
              <div class="image-strip" aria-label="Vessi product and lifestyle images">
                <img src="img/weekend-classic-lifestyle.jpg" alt="White Vessi sneakers with water droplets">
                <img src="img/brand-everyday.jpg" alt="Person walking in Vessi sneakers on a rainy city street">
                <img src="img/weekend-neo-lifestyle.jpg" alt="Vessi sneaker stepping through water">
              </div>
            `,
            actions: `${button("Start my match", "start")}<a class="secondary" href="https://vessi.com/" data-track="cta_clicked" data-track-section="welcome">Shop Vessi</a>`,
            progress: 3
          });
          attachActions();
        },
        role() {
          render({
            kicker: "Step 1",
            title: "Are you a student or educator?",
            options: [
              { value: "student", label: "Student" },
              { value: "teacher", label: "Teacher or education professional" }
            ]
          });
        },
        country() {
          render({
            kicker: "Eligibility",
            title: "Where are you entering from?",
            prompt: "We’ll check eligibility before asking for your contact details.",
            options: [
              { value: "us", label: "United States" },
              { value: "canada", label: "Canada" },
              { value: "other", label: "Other" }
            ]
          });
        },
        state() {
          const states = ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "District of Columbia", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"];
          regionSelect("What state are you entering from?", states, "age");
        },
        province() {
          const provinces = ["Alberta", "British Columbia", "Manitoba", "New Brunswick", "Newfoundland and Labrador", "Northwest Territories", "Nova Scotia", "Nunavut", "Ontario", "Prince Edward Island", "Quebec", "Saskatchewan", "Yukon"];
          regionSelect("What province are you entering from?", provinces, "age");
        },
        age() {
          render({
            kicker: "Eligibility",
            title: "Are you 18 or older?",
            options: [
              { value: "18plus", label: "Yes" },
              { value: "under18", label: "No" }
            ]
          });
        },
        student_walk() {
          render({
            kicker: "Student match",
            title: "On a normal campus day, how much are you walking?",
            options: [
              { value: "under15", label: "Under 15 minutes" },
              { value: "15to30", label: "15-30 minutes" },
              { value: "30to60", label: "30-60 minutes", tags: ["long_walk_student", "comfort_need"] },
              { value: "over60", label: "Over an hour", tags: ["long_walk_student", "comfort_need"] }
            ]
          });
        },
        student_rain() {
          render({
            kicker: "Student match",
            title: "What do you reach for on rainy class days?",
            media: "img/question-student-rain.jpg",
            options: [
              { value: "regular", label: "Regular sneakers", tags: ["wet_style_conflict", "waterproof_need"] },
              { value: "white", label: "White sneakers", tags: ["wet_style_conflict", "easy_clean_need"] },
              { value: "boots", label: "Rain boots", tags: ["bulky_boot_problem", "lightweight_need"] },
              { value: "outfit", label: "Whatever matches my outfit", tags: ["wet_style_conflict", "style_need"] },
              { value: "backup", label: "I bring a second pair", tags: ["backup_pair_problem", "one_pair_need"] }

        },
        student_pain() {
          render({

              { value: "socks", label: "Dry socks", tags: ["waterproof_need"] },
              { value: "walks", label: "Comfortable campus walks", tags: ["comfort_need"] },

          });
        },
        student_lifestyle() {
          render({
            kicker: "Student match",
            title: "Where do your back-to-school shoes need to take you?",
            media: "img/question-student-commute.jpg",
            options: [
              { value: "class", label: "Class and campus walks" },
              { value: "commute", label: "Commuting" },
              { value: "going_out", label: "Going out after class", tags: ["versatility_need", "style_need"] },
              { value: "work", label: "Work or internship days", tags: ["versatility_need"] },
              { value: "everything", label: "Basically everything", tags: ["versatility_need", "one_pair_need"] }
            ]
          });
        },
        student_intent() {
          render({
            kicker: "One last match question",
            title: "When are you hoping to find your next pair?",
            options: [
              { value: "active", label: "For the start of school", tags: ["high_intent"] },

              { value: "giveaway", label: "I’m browsing for now", tags: ["low_intent"] }
            ]
          });
        },
        student_insight() {
          const product = recommend();
          renderInsight({
            role: "student",
            title: `Your campus match is ${product.name}.`,
            text: studentInsight(product),
            product,
            next: "school"
          });
        },
        teacher_feet() {
          render({
            kicker: "Teacher match",
            title: "On a normal school day, how long are you on your feet?",
            options: [
              { value: "under4", label: "Under 4 hours" },
              { value: "4to6", label: "4-6 hours" },
              { value: "6to8", label: "6-8 hours", tags: ["high_comfort_need", "comfort_need"] },
              { value: "8plus", label: "8+ hours", tags: ["high_comfort_need", "comfort_need"] }
            ]
          });
        },
        teacher_rain() {
          render({
            kicker: "Teacher match",
            title: "What do you reach for on rainy school days?",
            media: "img/question-teacher-rain.jpg",
            options: [
              { value: "regular", label: "Regular sneakers", tags: ["waterproof_need"] },
              { value: "flats", label: "Flats or loafers", tags: ["waterproof_need", "style_need"] },
              { value: "boots", label: "Rain boots", tags: ["bulky_boot_problem", "lightweight_need"] },
              { value: "old", label: "An older pair", tags: ["easy_clean_need"] },
              { value: "backup", label: "I bring a backup pair", tags: ["one_pair_need"] }
            ]
          });
        },
        teacher_pain() {
          render({
            kicker: "Teacher match",
            title: "What would make rainy school days better?",
            prompt: "Choose the one that matters most.",
            options: [
              { value: "socks", label: "Dry socks", tags: ["waterproof_need"] },
              { value: "tired", label: "Comfort for long days", tags: ["comfort_need"] },
              { value: "dirty", label: "Simple shoe care", tags: ["easy_clean_need"] },
              { value: "clunky", label: "No clunky rain boots", tags: ["lightweight_need"] },
              { value: "style", label: "Everyday sneaker style", tags: ["style_need"] }
            ]
          });
        },
        teacher_use() {
          render({
            kicker: "Teacher match",
            title: "Where do you want Weather-Free comfort?",
            media: "img/question-teacher-workday.jpg",
            mediaClass: "question-accent--teacher-workday",
            options: [
              { value: "commute", label: "Rainy commutes", tags: ["waterproof_need"] },
              { value: "hallway", label: "Classroom and hallway duty", tags: ["comfort_need"] },
              { value: "recess", label: "Recess or outdoor supervision", tags: ["easy_clean_school", "easy_clean_need"] },
              { value: "spills", label: "Spills and messy floors", tags: ["easy_clean_school", "easy_clean_need"] },
              { value: "errands", label: "School day and after-school errands", tags: ["versatility_need"] }
            ]
          });
        },
        teacher_intent() {
          render({
            kicker: "One last match question",
            title: "When would a new pair be most useful?",
            options: [
              { value: "yes", label: "For the start of school", tags: ["high_intent"] },
              { value: "maybe", label: "When I find the right fit", tags: ["medium_intent", "deal_sensitive"] },
              { value: "later", label: "I’m browsing for now", tags: ["low_intent"] }
            ]
          });
        },
        teacher_insight() {
          const product = recommend();
          renderInsight({
            role: "teacher",
            title: `Your school-day match is ${product.name}.`,
            text: teacherInsight(product),
            product,
            next: "school"
          });
        },
        school() {
          const label = "School or institution";
          render({
            kicker: "Entry details",
            title: "What’s your school or institution?",
            prompt: "Add the school or institution connected with your entry.",
            body: `
              <div class="form-grid">
                <div class="field full">
                  <label for="schoolName">${label}</label>
                  <input id="schoolName" name="schoolName" autocomplete="organization" minlength="2" aria-describedby="formError" value="${escapeHtml(state.profile.school || "")}" required>
                </div>
              </div>
              <p class="error" id="formError" role="alert" aria-live="polite"></p>
            `,
            actions: `${button("Add my school", "contact")}${button("Back", "back", "ghost")}`,
            onRendered() {
              document.getElementById("schoolName")?.addEventListener("input", (event) => {
                state.profile.school = event.target.value;
                syncUpdate();
              });
            }
          });
          attachActions();
        },
        contact() {
          const privacyUrl = state.country === "canada" ? "https://ca.vessi.com/policies/privacy-policy" : "https://vessi.com/policies/privacy-policy";
          render({
            kicker: "Entry details",
            title: "Add your contact details.",
            prompt: `We’ll use these details for your giveaway entry. Read Vessi’s <a href="${privacyUrl}" target="_blank" rel="noopener">Privacy Policy</a>.`,
            body: `
              <div class="form-grid">

                </div>
                <div class="field">
                  <label for="lastName">Last name</label>
                  <input id="lastName" name="lastName" autocomplete="family-name" minlength="2" aria-describedby="formError" value="${escapeHtml(state.contact.last || "")}" required>
                </div>
                <div class="field full">
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" autocomplete="email" aria-describedby="formError" value="${escapeHtml(state.contact.email || "")}" required>
                </div>
              </div>
              <p class="error" id="formError" role="alert" aria-live="polite"></p>
            `,
            actions: `${button("Review my entry", "terms")}${button("Back", "back", "ghost")}`,
            onRendered() {
              ["firstName", "lastName", "email"].forEach((id) => {
                document.getElementById(id)?.addEventListener("input", captureContactDraft);
                document.getElementById(id)?.addEventListener("change", captureContactDraft);
              });
            }
          });
          attachActions();
        },
        terms() {
          render({
            kicker: "Final step",
            title: "Review and enter.",
            prompt: "Confirm your eligibility and review the terms before entering.",
            body: `
              <label class="checkbox-row">
                <input id="termsCheck" type="checkbox" aria-describedby="formError" ${state.terms_accepted ? "checked" : ""}>
                <span>I accept Vessi’s <a href="${state.country === "canada" ? "https://ca.vessi.com/policies/terms-of-service" : "https://vessi.com/policies/terms-of-service"}" target="_blank" rel="noopener">Terms of Service</a>.</span>
              </label>
              <label class="checkbox-row">
                <input id="marketingCheck" type="checkbox" ${state.marketing_consent ? "checked" : ""}>
                <span>I would like to receive Vessi news and marketing by email. This is optional.</span>
              </label>
              <p class="mini-note">No purchase necessary. Eligibility restrictions apply.</p>
              <p class="error" id="formError" role="alert" aria-live="polite"></p>
            `,
            actions: `${button("Enter giveaway & see my result", "results")}${button("Back", "back", "ghost")}`,
            onRendered() {
              document.getElementById("termsCheck")?.addEventListener("change", (event) => {
                state.terms_accepted = event.target.checked;
                syncUpdate();
              });
              document.getElementById("marketingCheck")?.addEventListener("change", (event) => {
                state.marketing_consent = event.target.checked;
                state.consent_date = event.target.checked ? new Date().toISOString() : "";
                syncUpdate();
              });
            }
          });
          attachActions();
        },
        results() {
          renderResult();
        }
      };

      function regionSelect(title, options) {
        const regionLabel = title.includes("state") ? "State" : "Province";
        render({
          kicker: "Eligibility",
          title,
          prompt: `Choose your ${regionLabel.toLowerCase()} so we can confirm eligibility.`,
          body: `
            <div class="form-grid">
              <div class="field full">
                <label for="regionSelect">${regionLabel}</label>
                <select id="regionSelect" aria-describedby="formError" required>
                  <option value="">Choose your ${regionLabel.toLowerCase()}</option>
                  ${options.map((option) => `<option value="${option.toLowerCase().replace(/[^a-z0-9]+/g, "-")}">${option}</option>`).join("")}
                </select>
              </div>
            </div>
            <p class="error" id="formError" role="alert" aria-live="polite"></p>
          `,
          actions: `${button("Confirm my location", "regionContinue")}${button("Back", "back", "ghost")}`
        });
      }

      function submitRegion() {
        const select = document.getElementById("regionSelect");
        if (!select || !select.value) return setError(`Choose your ${state.step === "state" ? "state" : "province"} to continue.`);
        state.answers[state.step] = { value: select.value, label: select.options[select.selectedIndex].text, tags: [] };
        trackEvent("quiz_answered", { question_id: state.step, answer: select.value, role: state.role });
        goNext(select.value, select.options[select.selectedIndex].text);
        syncUpdate();
      }

      function renderInsight({ title, text, product }) {
        render({
          kicker: "Your match",
          title,
          prompt: `${text} Complete three short entry steps to enter the giveaway.`,
          body: `
            <div class="insight-card">
              <div>
                <strong>${product.short}</strong>
                <p>${microProof()}</p>
              </div>
              <img src="${product.image}" alt="${product.name} waterproof sneaker">
            </div>
          `,
          actions: `${button("Start my entry", "school")}${button("Back", "back", "ghost")}`
        });
        attachActions();
      }

      function submitSchool() {
        const input = document.getElementById("schoolName");
        const school = input.value.trim();
        input.removeAttribute("aria-invalid");
        if (school.length < 2) {
          input.setAttribute("aria-invalid", "true");
          return setError("Enter your school or institution.");
        }
        state.profile.school = school;
        syncUpdate();
        pushStep("contact");
      }

      function captureContactDraft() {
        state.contact = {
          first: document.getElementById("firstName")?.value.trim() || "",
          last: document.getElementById("lastName")?.value.trim() || "",
          email: document.getElementById("email")?.value.trim() || "",
          phone: "",
          smsOptIn: false
        };
        syncUpdate();
      }

      function submitContact() {
        const firstInput = document.getElementById("firstName");
        const lastInput = document.getElementById("lastName");
        const emailInput = document.getElementById("email");
        const first = firstInput.value.trim();
        const last = lastInput.value.trim();
        const email = emailInput.value.trim();
        [firstInput, lastInput, emailInput].forEach((input) => input.removeAttribute("aria-invalid"));
        if (first.length < 2) {
          firstInput.setAttribute("aria-invalid", "true");
          return setError("Enter your first name.");
        }
        if (last.length < 2) {
          lastInput.setAttribute("aria-invalid", "true");
          return setError("Enter your last name.");
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailInput.setAttribute("aria-invalid", "true");
          return setError("Enter a valid email address.");
        }
        state.contact = { first, last, email, phone: "", smsOptIn: false };
        syncUpdate();
        analytics.identify({ email, first_name: first, last_name: last });
        trackEvent("contact_submitted", { role: state.role }, { once: true });
        pushStep("terms");
      }

      function submitTerms() {
        if (!document.getElementById("termsCheck").checked) return setError("Accept the terms to complete your entry.");
        state.terms_accepted = true;
        state.marketing_consent = document.getElementById("marketingCheck").checked;
        state.consent_date = state.marketing_consent ? (state.consent_date || new Date().toISOString()) : "";
        state.entry_completed_at = new Date().toISOString();
        const finalProfile = klaviyoProfile();
        analytics.identify(finalProfile);
        void analytics.subscribe(finalProfile, state.marketing_consent);
        void quizSync.flush({ keepalive: true });
        progressBar.style.width = "100%";
        analytics.track("quiz_completed", summary(), { once: true, klaviyoProperties: finalProfile });
        pushStep("results");
      }

      function setError(message) {
        const error = document.getElementById("formError");
        if (error) error.textContent = message;
      }

      function recommend() {
        const tags = state.tags;
        if (tags.has("comfort_need") || tags.has("high_comfort_need") || tags.has("long_walk_student")) return products.neo;
        if (tags.has("one_pair_need") || tags.has("backup_pair_problem")) return products.slip;
        if (tags.has("easy_clean_need") || tags.has("easy_clean_school")) return products.neo;
        return products.classic;
      }

      function painLine() {
        const tags = state.tags;
        if (tags.has("comfort_need") || tags.has("high_comfort_need")) return "lightweight and breathable comfort";
        if (tags.has("easy_clean_need") || tags.has("easy_clean_school")) return "machine-friendly care with a rinse, mild soap, and air drying";
        if (tags.has("one_pair_need")) return "100% waterproof, lightweight comfort";
        if (tags.has("style_need") || tags.has("wet_style_conflict")) return "dry socks and flexible waterproof knit";
        return "dry socks and year-round comfort";
      }

      function microProof() {
        return "100% waterproof with patented Dyma-tex® knit. Lightweight and breathable, backed by our 365-Day Waterproof Guarantee.";
      }

      function studentInsight(product) {
        if (product === products.neo) return "You prioritized campus walks and comfort. Your match combines 100% waterproof protection with lightweight, breathable knit.";
        if (product === products.slip) return "You prioritized one-pair convenience. Your match is 100% waterproof, lightweight, and breathable.";
        return "You prioritized dry socks and everyday sneaker style. Your match uses flexible, 100% waterproof knit.";
      }

      function teacherInsight(product) {
        if (product === products.neo) return "You prioritized lightweight comfort. Your match combines 100% waterproof protection with breathable knit.";
        if (product === products.slip) return "You prioritized simple daily wear. Your match is 100% waterproof, lightweight, and breathable.";
        return "You prioritized dry socks and everyday sneaker style. Your match uses flexible, 100% waterproof knit.";
      }

      function intentBucket() {
        if (state.tags.has("high_intent")) return "high_intent";
        if (state.tags.has("medium_intent") || state.tags.has("deal_sensitive")) return "medium_intent";
        return "low_intent";
      }

      function resultCopy(product) {
        const rolePhrase = state.role === "teacher" ? "school-day" : "campus";
        return {
          headline: `Meet your ${rolePhrase} match.`,
          body: `${product.name} fits your day with ${painLine()} and 100% waterproof Dyma-tex® knit.`
        };
      }

      function renderResult() {
        const product = recommend();
        const copy = resultCopy(product);
        hidden.recommended_product = product.name;
        hidden.intent_bucket = intentBucket();
        const attribution = {
          entry_id: quizSync.entry.entry_id,
          utm_source: hidden.utm_source || quizConfig.utmSource || "quiz",
          utm_medium: quizConfig.utmMedium || "quiz",
          utm_campaign: hidden.utm_campaign || quizConfig.campaign || "bts-quiz",
          utm_content: `${state.role}-${intentBucket()}`,
          affiliate_id: hidden.affiliate_id || "",
          role: state.role,
          recommendation: product.name,
          intent_bucket: intentBucket()
        };
        const ctaUrl = addAttributionToUrl(product.url, attribution);

        render({
          kicker: "Entry submitted",
          title: copy.headline,
          prompt: copy.body,
          body: `
            <div class="result-layout">
              <div class="result-card">
                <p class="result-eyebrow">Why it fits your day</p>
                <p class="result-name">${product.name}</p>
                <p class="mini-note">${product.short}</p>
                <ul class="benefit-list">
                  <li>${painLine()}</li>
                  <li>100% waterproof Dyma-tex® knit</li>
                  <li>Backed by our 365-Day Waterproof Guarantee</li>
                </ul>
                <p class="result-complete">Your entry has been submitted. Explore your match whenever you’re ready.</p>
                <a class="primary result-inline-cta" href="${ctaUrl}" data-track="cta_clicked" data-track-section="results" data-track-text="Shop my match">Shop my match</a>
              </div>
              <div class="result-card result-visuals">
                <img class="product-art" src="${product.image}" alt="${product.name} waterproof sneaker">
                <img class="lifestyle-art" src="${product.lifestyle}" alt="${product.name} lifestyle image">
              </div>
            </div>
          `,
          actions: `${button("Start over", "restart", "ghost")}`,
          progress: 100,
          onRendered() {
            screen.querySelector('[data-action="restart"]').addEventListener("click", () => {
              quizSync.reset();
              location.reload();
            });
            trackEvent("result_viewed", summary(), { once: true });
          }
        });
      }

      function showIneligible(reason) {
        hidden.eligibility_status = "ineligible";
        const title = reason.includes("18")
          ? "You must be 18 or older to enter."
          : reason.includes("Quebec")
            ? "This giveaway isn’t available in Quebec."
            : "This giveaway isn’t available in your location.";
        render({
          kicker: "Eligibility",
          title,
          prompt: reason,
          body: `
            <div class="insight-card">
              <div>
                <strong>You can still explore waterproof back-to-school picks.</strong>
                <p>We checked eligibility before asking for your contact details.</p>
              </div>
              <img src="img/weekend-classic.png" alt="Weekend Classic waterproof sneaker">
            </div>
          `,
          actions: `<a class="primary" href="https://vessi.com/" data-track="cta_clicked" data-track-section="ineligible">Shop back-to-school picks</a>${button("Start over", "restart", "ghost")}`,
          progress: 100,
          onRendered() {
            screen.querySelector('[data-action="restart"]').addEventListener("click", () => {
              quizSync.reset();
              location.reload();
            });
            trackEvent("ineligible_viewed", { reason });
          }
        });
      }

      function summary() {
        const product = recommend();
        return {
          role: state.role,
          tags: Array.from(state.tags),
          intent_bucket: intentBucket(),
          recommended_product: product.name
        };
      }

      function klaviyoProfile() {
        return {
          email: state.contact.email,
          first_name: state.contact.first,
          last_name: state.contact.last,
          country: state.country,
          state_province: state.region,
          type: state.role,
          school: state.profile.school,
          answers: Object.fromEntries(Object.entries(state.answers).map(([key, answer]) => [key, answer.value])),
          recommendation: recommend().name,
          intent_bucket: intentBucket(),
          entry_id: quizSync.entry.entry_id,
          entry_started_at: quizSync.entry.entry_started_at,
          entry_completed_at: state.entry_completed_at,
          marketing_consent: state.marketing_consent,
          consent_date: state.consent_date
        };
      }

      routes.welcome();
      trackEvent("quiz_viewed", {}, { once: true });
    </script>
  </body>
</html>
