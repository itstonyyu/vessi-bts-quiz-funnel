<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Find your waterproof back-to-school Vessi match and enter the giveaway.">
    <title>Vessi Back-to-School Match Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #171512;
        --muted: #6a625b;
        --paper: #f4f0e9;
        --panel: #fffaf3;
        --mist: #dcebe2;
        --moss: #526d58;
        --moss-dark: #2f4738;
        --clay: #df7f5f;
        --sun: #f4c24f;
        --aqua: #c9e5e9;
        --line: rgba(36, 31, 27, 0.14);
        --shadow: 0 24px 80px rgba(36, 31, 27, 0.14);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100%;
        margin: 0;
        background:
          linear-gradient(125deg, rgba(201, 229, 233, 0.64), rgba(244, 240, 233, 0.2) 42%, rgba(244, 194, 79, 0.14)),
          var(--paper);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: minmax(280px, 0.88fr) minmax(420px, 1.12fr);
      }

      /* Campaign art belongs to the start screen only. Once the quiz is
         underway, give the questionnaire the full viewport on every device. */
      .shell.quiz-started {
        grid-template-columns: minmax(0, 1fr);
      }

      .shell.quiz-started .brand-panel {
        display: none;
      }

      .shell.quiz-started .quiz-panel {
        min-height: 100dvh;
        padding: clamp(24px, 5vw, 64px);
      }

      .shell.quiz-started .quiz-card {
        width: min(100%, 840px);
      }

      .shell.quiz-started .screen {
        min-height: min(620px, calc(100dvh - clamp(48px, 10vw, 128px)));
      }

      .shell:not(.quiz-started) .screen {
        min-height: min(620px, calc(100dvh - 112px));
      }

      /* The campaign panel already supplies the landing imagery. Avoid a
         second gallery making the start action fall below the viewport. */
      .shell:not(.quiz-started) .image-strip {
        display: none;
      }

      .brand-panel {
        position: relative;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        overflow: hidden;
        background: #314d3b;
        color: #fffaf2;
      }

      .brand-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(23, 21, 18, 0.04), rgba(23, 21, 18, 0.28)),
          radial-gradient(circle at 80% 16%, rgba(244, 194, 79, 0.28), transparent 26%),
          radial-gradient(circle at 8% 82%, rgba(201, 229, 233, 0.32), transparent 28%);
        pointer-events: none;
      }

      .brand-top,
      .brand-media,
      .brand-bottom {
        position: relative;
        z-index: 1;
      }

      .brand-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .logo {
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .campaign-pill {
        border: 1px solid rgba(255, 250, 242, 0.42);
        border-radius: 999px;
        padding: 8px 12px;
        color: rgba(255, 250, 242, 0.86);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-media {
        display: grid;
        grid-template-columns: 1.08fr 0.92fr;
        grid-template-rows: 1fr 0.86fr;
        gap: 14px;
        min-height: 42dvh;
        margin-top: 42px;
      }

      .media-card {
        position: relative;
        min-height: 160px;
        overflow: hidden;
        border: 1px solid rgba(255, 250, 242, 0.2);
        border-radius: var(--radius);
        background: rgba(255, 250, 242, 0.08);
      }

      .media-card.large {
        grid-row: span 2;
      }

      .media-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .media-card.product {
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #f4f0e9, #c9e5e9);
      }

      .media-card.product img {
        width: 90%;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(23, 21, 18, 0.18));
      }

      .media-caption {
        position: absolute;
        left: 12px;
        bottom: 12px;
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(23, 21, 18, 0.72);
        color: #fffaf2;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .brand-bottom {
        margin-top: auto;
        padding-top: 32px;
      }

      .brand-bottom h1 {
        max-width: 560px;
        margin: 0 0 16px;
        font-size: clamp(44px, 6vw, 84px);
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .brand-bottom p {
        max-width: 470px;
        margin: 0;
        color: rgba(255, 250, 242, 0.86);
        font-size: 17px;
        line-height: 1.55;
      }

      .quiz-panel {
        min-height: 100dvh;
        display: grid;
        align-items: center;
        padding: 48px;
      }

      .quiz-card {
        width: min(100%, 760px);
        margin: 0 auto;
        background: rgba(255, 250, 243, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(18px);
      }

      .progress-wrap {
        height: 8px;
        background: rgba(57, 90, 69, 0.12);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--moss), var(--clay));
        transition: width 320ms ease;
      }

      .screen {
        display: none;
        min-height: 620px;
        padding: 40px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
        animation: rise 220ms ease both;
      }

      @keyframes rise {
        from {
          opacity: 0.01;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kicker {
        margin: 0 0 16px;
        color: var(--moss-dark);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h2 {
        margin: 0;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
      }

      /* Question headings receive programmatic focus so screen readers announce
         each step; they are not interactive, so a visible focus ring is noise. */
      #screen h2:focus {
        outline: none;
      }

      .prompt {
        margin: 18px 0 0;
        max-width: 610px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
      }

      /* Selected question screens use a full-width editorial image band. It is
         large enough to read without becoming another landing-page hero. */
      .question-accent {
        width: 100%;
        height: 160px;
        margin: 18px 0 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--mist);
      }

      .question-accent img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 32px;
      }

      .option {
        min-height: 78px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        text-align: left;
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .option:hover,
      .option:focus-visible {
        border-color: rgba(57, 90, 69, 0.55);
        background: #fff;
        transform: translateY(-1px);
        outline: none;
      }

      .option-key {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--mist);
        color: var(--moss-dark);
        font-size: 13px;
        font-weight: 800;
      }

      .option span:last-child {
        font-weight: 750;
        line-height: 1.3;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: auto;
        padding-top: 36px;
      }

      .primary,
      .secondary {
        min-height: 50px;
        border-radius: var(--radius);
        padding: 0 20px;
        font-weight: 800;
        text-decoration: none;
      }

      .primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        background: var(--ink);
        color: #fffaf2;
      }

      .secondary {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
        color: var(--ink);
      }

      .ghost {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-weight: 800;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 30px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
      }

      input:focus,
      select:focus {
        border-color: var(--moss);
        outline: 3px solid rgba(95, 127, 104, 0.18);
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .checkbox-row input {
        width: 18px;
        min-height: 18px;
        margin-top: 1px;
      }

      .mini-note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .insight-card {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 24px;
        align-items: center;
        margin-top: 28px;
        border: 1px solid rgba(95, 127, 104, 0.28);
        border-left: 5px solid var(--moss);
        border-radius: var(--radius);
        padding: 20px;
        background: rgba(216, 231, 225, 0.42);
      }

      .insight-card p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .insight-card img {
        width: 100%;
        max-width: 180px;
        justify-self: center;
        filter: drop-shadow(0 18px 24px rgba(36, 31, 27, 0.16));
      }

      .result-layout {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 28px;
        align-items: start;
        margin-top: 24px;
      }

      .result-card,
      .profile-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.7);
        padding: 18px;
      }

      .product-art {
        width: 100%;
        max-width: 240px;
        display: block;
        margin: 0 auto 12px;
        filter: drop-shadow(0 18px 28px rgba(36, 31, 27, 0.18));
      }

      .lifestyle-art {
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-top: 14px;
        border-radius: var(--radius);
        object-fit: cover;
        display: block;
      }

      .result-name {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 850;
      }

      .benefit-list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .benefit-list li {
        display: flex;
        gap: 10px;
        color: var(--muted);
        line-height: 1.45;
      }

      .benefit-list li::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        margin-top: 8px;
        border-radius: 50%;
        background: var(--clay);
      }

      .profile-card {
        margin-top: 18px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .profile-item {
        border-radius: var(--radius);
        background: rgba(247, 241, 232, 0.8);
        padding: 12px;
      }

      .profile-item strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--moss-dark);
      }

      .profile-item span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .error {
        min-height: 18px;
        margin-top: 14px;
        color: #9b3528;
        font-size: 14px;
        font-weight: 800;
      }

      .footer-trust {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .image-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .image-strip img {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: var(--radius);
        object-fit: cover;
        display: block;
      }

      .trust-pill {
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 8px 11px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.56);
      }

      @media (min-width: 1025px) and (max-height: 800px) {
        .shell:not(.quiz-started) .brand-panel {
          padding: 24px;
        }

        .shell:not(.quiz-started) .brand-media {
          grid-template-rows: minmax(0, 1fr) minmax(0, 0.86fr);
          flex: 0 0 220px;
          min-height: 0;
          height: 220px;
          margin-top: 20px;
        }

        .shell:not(.quiz-started) .media-card {
          min-height: 0;
        }

        .shell:not(.quiz-started) .brand-bottom {
          padding-top: 20px;
        }

        .shell:not(.quiz-started) .brand-bottom h1 {
          margin-bottom: 10px;
          font-size: 48px;
        }

        .shell:not(.quiz-started) .brand-bottom p {
          font-size: 14px;
          line-height: 1.4;
        }

        .shell:not(.quiz-started) .screen {
          padding: 30px;
        }

        .shell:not(.quiz-started) .screen h2 {
          font-size: 42px;
        }

        .shell:not(.quiz-started) .prompt {
          margin-top: 12px;
          font-size: 16px;
        }

        .shell:not(.quiz-started) .actions {
          padding-top: 24px;
        }
      }

      /* On short desktop windows, protect answer visibility over decoration. */
      @media (min-width: 1025px) and (max-height: 760px) {
        .shell.quiz-started .question-accent {
          display: none;
        }
      }

      @media (max-width: 1024px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .brand-panel {
          min-height: 430px;
        }

        .brand-bottom h1 {
          font-size: clamp(40px, 8vw, 72px);
        }

        .quiz-panel {
          min-height: auto;
          padding: 28px;
        }
      }

      @media (max-width: 720px) {
        .brand-panel {
          min-height: auto;
          padding: 20px;
        }

        .brand-media {
          min-height: 250px;
          margin-top: 28px;
        }

        .shell:not(.quiz-started) .brand-media {
          min-height: 180px;
          margin-top: 16px;
        }

        .shell:not(.quiz-started) .brand-bottom {
          padding-top: 18px;
        }

        .shell:not(.quiz-started) .brand-bottom h1 {
          margin-bottom: 10px;
          font-size: 34px;
        }

        .shell:not(.quiz-started) .brand-bottom p {
          font-size: 14px;
          line-height: 1.4;
        }

        .brand-bottom p {
          font-size: 15px;
        }

        .brand-bottom h1 {
          font-size: 42px;
          line-height: 0.98;
        }

        .quiz-panel {
          padding: 16px;
        }

        .shell:not(.quiz-started) .quiz-panel {
          padding: 12px 12px 16px;
        }

        .shell:not(.quiz-started) .screen {
          min-height: auto;
          padding: 22px 20px;
        }

        .shell:not(.quiz-started) .screen h2,
        .shell:not(.quiz-started) .screen .prompt {
          /* The adjacent hero carries the landing heading and description. */
          display: none;
        }

        .shell:not(.quiz-started) .actions {
          padding-top: 22px;
        }

        .screen {
          min-height: 620px;
          padding: 28px 20px;
        }

        .shell.quiz-started .quiz-panel {
          min-height: 100dvh;
          align-items: start;
          padding: 12px;
        }

        .shell.quiz-started .quiz-card {
          min-height: calc(100dvh - 24px);
          box-shadow: 0 12px 40px rgba(36, 31, 27, 0.1);
        }

        .shell.quiz-started .screen {
          min-height: calc(100dvh - 32px);
          padding: clamp(22px, 5.5vw, 30px) clamp(18px, 5vw, 24px);
        }

        .shell.quiz-started h2 {
          font-size: clamp(30px, 9vw, 42px);
        }

        .shell.quiz-started .prompt {
          margin-top: 12px;
          font-size: 16px;
          line-height: 1.45;
        }

        .shell.quiz-started .option-grid {
          gap: 9px;
          margin-top: 22px;
        }

        .shell.quiz-started .question-accent {
          width: 100%;
          height: 120px;
          margin-top: 14px;
        }

        .shell.quiz-started .question-accent + .option-grid {
          margin-top: 12px;
        }

        .shell.quiz-started .option {
          min-height: 58px;
          padding: 12px;
        }

        .shell.quiz-started .actions {
          padding-top: 24px;
        }

        .shell.quiz-started .form-grid {
          margin-top: 22px;
        }

        .option-grid,
        .form-grid,
        .result-layout,
        .profile-grid {
          grid-template-columns: 1fr;
        }

        .insight-card {
          grid-template-columns: 1fr;
        }

        .insight-card img {
          max-width: 150px;
        }
      }

      @media (max-width: 420px) {
        .brand-panel {
          min-height: auto;
        }

        .brand-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .campaign-pill {
          white-space: normal;
        }

        h2 {
          font-size: 34px;
        }

        .prompt {
          font-size: 16px;
        }

        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .primary,
        .secondary,
        .ghost {
          width: 100%;
        }

        .image-strip {
          grid-template-columns: 1fr;
        }

        .shell.quiz-started .kicker {
          margin-bottom: 10px;
        }

        .shell:not(.quiz-started) .brand-top {
          align-items: center;
          flex-direction: row;
        }

        .shell:not(.quiz-started) .brand-media {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          grid-template-rows: 130px;
          min-height: 130px;
          gap: 8px;
        }

        .shell:not(.quiz-started) .media-card {
          min-height: 0;
        }

        .shell:not(.quiz-started) .media-card.large {
          grid-row: auto;
        }

        .shell.quiz-started .actions {
          gap: 8px;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-KkVBQ3DE.js"></script>
  </head>
  <body>
    <main class="shell" data-view="landing">
      <aside class="brand-panel" aria-label="Vessi back-to-school campaign">
        <div class="brand-top">
          <div class="logo">Vessi</div>
          <div class="campaign-pill">Back-to-school match quiz</div>
        </div>
        <div class="brand-media" aria-hidden="true">
          <div class="media-card large">
            <img src="./assets/brand-work-ChcdAh3k.jpg" alt="">
            <span class="media-caption">Rain ready</span>
          </div>
          <div class="media-card">
            <img src="./assets/weekend-neo-lifestyle-0GCLwUP4.jpg" alt="">
            <span class="media-caption">Waterproof knit</span>
          </div>
          <div class="media-card product">
            <img src="./assets/weekend-classic-IlY00xW2.png" alt="">
            <span class="media-caption">Everyday sneaker</span>
          </div>
        </div>
        <div class="brand-bottom">
          <h1>Find your waterproof school-day sneaker.</h1>
          <p>Answer a few quick questions, get matched to the Vessi pair built for your day, and enter the back-to-school giveaway.</p>
        </div>
      </aside>

      <section class="quiz-panel">
        <div class="quiz-card" aria-live="polite">
          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div id="screen" class="screen active"></div>
        </div>
      </section>
    </main>

  </body>
</html>
