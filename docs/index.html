<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Find your 100% waterproof Vessi match and enter the back-to-school giveaway.">
    <title>Vessi back-to-school match quiz</title>
    <!-- Meta Pixel Code -->

    <style>
      /* These files are the exact production assets published by vessi.com. */
      @font-face {
        font-family: 'Noi Grotesk';
        src: url('./fonts/NoiGrotesk-Regular.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: 'Noi Grotesk';
        src: url('./fonts/NoiGrotesk-Medium.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 500;
      }

      @font-face {
        font-family: 'ABCDiatypeMono';
        src: url('./fonts/ABCDiatypeMono-Regular.woff2') format('woff2');
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      :root {
        --vessi-blue: #0069F0;
        --vessi-ink: #28201A;
        --vessi-white: #FFFFFF;
        --vessi-border: #E6E6E6;
        --vessi-grey: #D8D8D8;
        --vessi-bone: #F4F0E9;
        --vessi-sky: #4D96F5;
        --vessi-scrim: rgba(85, 83, 70, 0.5);
        --muted-ink: rgba(40, 32, 26, 0.7);
        --shadow: 0 24px 80px rgba(40, 32, 26, 0.14);
        --card-radius: 25px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--vessi-white);
        color: var(--vessi-ink);
        font-family: 'Noi Grotesk', Arial, sans-serif;
        font-weight: 400;
        letter-spacing: 0;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: var(--vessi-white);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button,
      a,
      label {
        font-weight: 500;
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--vessi-blue);
        outline-offset: 2px;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: minmax(280px, 0.88fr) minmax(420px, 1.12fr);
      }

      /* Campaign art belongs to the start screen only. Once the quiz is
         underway, give the questionnaire the full viewport on every device. */
      .shell.quiz-started {
        grid-template-columns: minmax(0, 1fr);
      }

      .shell.quiz-started .brand-panel {
        display: none;
      }

      .shell.quiz-started .quiz-panel {
        min-height: 100dvh;
        padding: clamp(24px, 5vw, 64px);
      }

      .shell.quiz-started .quiz-card {
        width: min(100%, 840px);
      }

      .shell.quiz-started .screen {
        min-height: min(620px, calc(100dvh - clamp(48px, 10vw, 128px)));
      }

      .shell:not(.quiz-started) .screen {
        min-height: min(620px, calc(100dvh - 112px));
      }

      /* The campaign panel already supplies the landing imagery. Avoid a
         second gallery making the start action fall below the viewport. */
      .shell:not(.quiz-started) .image-strip {
        display: none;
      }

      .brand-panel {
        position: relative;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        overflow: hidden;
        background: var(--vessi-blue);
        color: var(--vessi-white);
      }

      .brand-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent, var(--vessi-scrim));
        pointer-events: none;
      }

      .brand-top,
      .brand-media,
      .brand-bottom {
        position: relative;
        z-index: 1;
      }

      .brand-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .logo {
        font-size: 16px;
        font-weight: 500;
      }

      .campaign-pill {
        border: 1px solid var(--vessi-sky);
        border-radius: 9999px;
        padding: 8px 12px;
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-media {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        flex: 0 0 auto;
        height: calc(100dvh - 127px);
        gap: 14px;
        min-height: 0;
        margin-top: 32px;
        overflow: hidden;
      }

      .media-card {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
        aspect-ratio: auto;
        overflow: hidden;
        border: 1px solid var(--vessi-sky);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
      }

      .media-card.large {
        grid-row: auto;
      }

      .media-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      .media-card.product {
        display: grid;
        place-items: center;
        background: var(--vessi-white);
      }

      .media-card.product img {
        width: auto;
        height: auto;
        max-width: 90%;
        max-height: 80%;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(40, 32, 26, 0.18));
      }

      .media-caption {
        position: absolute;
        left: 12px;
        bottom: 12px;
        border-radius: 9999px;
        padding: 7px 10px;
        background: var(--vessi-scrim);
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .brand-bottom {
        margin-top: auto;
        padding-top: 32px;
      }

      .brand-bottom h1 {
        max-width: 560px;
        margin: 0 0 16px;
        font-size: clamp(44px, 6vw, 72px);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .brand-bottom p {
        max-width: 470px;
        margin: 0;
        color: var(--vessi-white);
        font-size: 17px;
        line-height: 1.55;
      }

      .quiz-panel {
        min-height: 100dvh;
        display: grid;
        align-items: center;
        padding: 48px;
        background: var(--vessi-white);
      }

      .quiz-card {
        width: min(100%, 760px);
        margin: 0 auto;
        background: var(--vessi-white);
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .progress-wrap {
        height: 8px;
        background: var(--vessi-grey);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: var(--vessi-blue);
        transition: width 320ms ease;
      }

      .screen {
        display: none;
        min-height: 620px;
        padding: 40px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
        animation: rise 220ms ease both;
      }

      @keyframes rise {
        from {
          opacity: 0.01;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kicker {
        margin: 0 0 16px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 1.3;
        text-transform: uppercase;
      }

      h2 {
        margin: 0;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: 0;
      }

      /* Question headings receive programmatic focus so screen readers announce
         each step; they are not interactive, so a visible focus ring is noise. */
      #screen h2:focus {
        outline: none;
      }

      .prompt {
        margin: 18px 0 0;
        max-width: 610px;
        color: var(--muted-ink);
        font-size: 18px;
        line-height: 1.55;
      }

      .giveaway-details {
        display: grid;
        gap: 10px;
        margin-top: 24px;
        color: var(--vessi-ink);
        font-size: 17px;
        line-height: 1.5;
      }

      .giveaway-details p {
        margin: 0;
      }

      /* Question assets are pre-composed at 40:11. Preserve that full frame so
         footwear and context are never lost to runtime cropping. */
      .question-accent {
        width: 100%;
        height: auto;
        aspect-ratio: 40 / 11;
        margin: 18px 0 0;
        overflow: hidden;
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
      }

      .question-accent img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        object-position: center;
      }

      .question-accent.statement-media {
        width: min(100%, 360px);
        aspect-ratio: 1 / 1;
        align-self: center;
        background: var(--vessi-white);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 32px;
      }

      .option {
        min-height: 78px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        padding: 16px;
        background: var(--vessi-white);
        color: var(--vessi-ink);
        text-align: left;
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .option:hover {
        border-color: var(--vessi-blue);
        background: var(--vessi-white);
        transform: translateY(-1px);
      }

      .option-key {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--vessi-blue);
        color: var(--vessi-white);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
      }

      .option span:last-child {
        font-weight: 500;
        line-height: 1.3;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: auto;
        padding-top: 36px;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        border-radius: 9999px;
        padding: 0 20px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        text-decoration: none;
      }

      .primary {
        border: 1px solid var(--vessi-blue);
        background: var(--vessi-blue);
        color: var(--vessi-white);
      }

      .secondary {
        border: 1px solid var(--vessi-border);
        background: var(--vessi-white);
        color: var(--vessi-ink);
      }

      .ghost {
        min-height: 44px;
        border: 0;
        padding: 0 12px;
        background: transparent;
        color: var(--muted-ink);
        font-weight: 500;
      }

      .back-control {
        width: fit-content;
        min-width: 72px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: -8px 0 18px -12px;
        border: 0;
        border-radius: 9999px;
        padding: 0 12px;
        background: transparent;
        color: var(--muted-ink);
        font-weight: 500;
      }

      .back-control:hover {
        background: var(--vessi-grey);
        color: var(--vessi-ink);
      }

      .option.is-selected {
        border-color: var(--vessi-blue);
        box-shadow: inset 0 0 0 1px var(--vessi-blue);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 30px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted-ink);
        font-size: 13px;
        font-weight: 500;
      }

      input,
      select {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--vessi-border);
        border-radius: 9999px;
        padding: 0 14px;
        background: var(--vessi-white);
        color: var(--vessi-ink);
      }

      input:focus-visible,
      select:focus-visible {
        border-color: var(--vessi-blue);
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted-ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .checkbox-row input {
        width: 18px;
        min-height: 18px;
        margin-top: 1px;
      }

      .mini-note {
        margin-top: 10px;
        color: var(--muted-ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .insight-card {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 24px;
        align-items: center;
        margin-top: 28px;
        border: 1px solid var(--vessi-sky);
        border-left: 5px solid var(--vessi-blue);
        border-radius: var(--card-radius);
        padding: 20px;
        background: var(--vessi-white);
      }

      .insight-card p {
        margin: 8px 0 0;
        color: var(--muted-ink);
        line-height: 1.5;
      }

      .insight-card img {
        width: 100%;
        max-width: 180px;
        justify-self: center;
        filter: drop-shadow(0 18px 24px rgba(40, 32, 26, 0.16));
      }

      .result-layout {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 28px;
        align-items: start;
        margin-top: 24px;
      }

      .result-card,
      .profile-card {
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
        padding: 18px;
      }

      .product-art {
        width: 100%;
        max-width: 240px;
        display: block;
        margin: 0 auto 12px;
        filter: drop-shadow(0 18px 28px rgba(40, 32, 26, 0.18));
      }

      .lifestyle-art {
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-top: 14px;
        border-radius: var(--card-radius);
        object-fit: contain;
        display: block;
      }

      .result-name {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 500;
      }

      .result-eyebrow {
        margin: 0 0 10px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .result-visuals {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .result-complete {
        margin: 20px 0 0;
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(0, 105, 240, 0.08);
        color: var(--vessi-ink);
        font-size: 14px;
        line-height: 1.45;
      }

      .result-inline-cta {
        width: fit-content;
        margin-top: 18px;
      }

      .benefit-list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .benefit-list li {
        display: flex;
        gap: 10px;
        color: var(--muted-ink);
        line-height: 1.45;
      }

      .benefit-list li::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        margin-top: 8px;
        border-radius: 50%;
        background: var(--vessi-blue);
      }

      .profile-card {
        margin-top: 18px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .profile-item {
        border: 1px solid var(--vessi-border);
        border-radius: var(--card-radius);
        background: var(--vessi-white);
        padding: 12px;
      }

      .profile-item strong {
        display: block;
        margin-bottom: 4px;
        color: var(--vessi-blue);
        font-family: 'ABCDiatypeMono', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .profile-item span {
        color: var(--muted-ink);
        font-size: 14px;
        line-height: 1.35;
      }

      .error {
        min-height: 18px;
        margin-top: 14px;
        color: var(--vessi-ink);
        font-size: 14px;
        font-weight: 500;
      }

      .footer-trust {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .image-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .image-strip img {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: var(--card-radius);
        object-fit: contain;
        display: block;
      }

      .trust-pill {
        border-radius: 999px;
        border: 1px solid var(--vessi-border);
        padding: 8px 11px;
        color: var(--muted-ink);
        font-size: 12px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.56);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      @media (min-width: 1025px) and (max-height: 800px) {
        .shell:not(.quiz-started) .brand-panel {
          padding: 24px;
        }

        .shell:not(.quiz-started) .brand-media {
          grid-template-rows: 1fr;
          flex: 0 0 auto;
          min-height: 0;
          height: calc(100dvh - 127px);
          margin-top: 20px;
        }

        .shell:not(.quiz-started) .media-card {
          min-height: 0;
        }

        .shell:not(.quiz-started) .brand-bottom {
          padding-top: 20px;
        }

        .shell:not(.quiz-started) .brand-bottom h1 {
          margin-bottom: 10px;
          font-size: 48px;
        }

        .shell:not(.quiz-started) .brand-bottom p {
          font-size: 14px;
          line-height: 1.4;
        }

        .shell:not(.quiz-started) .screen {
          padding: 30px;
        }

        .shell:not(.quiz-started) .screen h2 {
          font-size: 42px;
        }

        .shell:not(.quiz-started) .prompt {
          margin-top: 12px;
          font-size: 16px;
        }

        .shell:not(.quiz-started) .actions {
          padding-top: 24px;
        }
      }

      /* On short desktop windows, keep statement photography visible at a
         smaller complete size instead of removing or cropping it. */
      @media (min-width: 1025px) and (max-height: 760px) {
        .shell.quiz-started .quiz-panel {
          padding: 16px;
        }

        .shell.quiz-started .screen {
          min-height: calc(100dvh - 40px);
          padding: 24px 40px;
        }

        .shell.quiz-started .screen h2 {
          font-size: 40px;
        }

        .shell.quiz-started .prompt {
          margin-top: 10px;
          font-size: 16px;
        }

        .shell.quiz-started .actions {
          padding-top: 10px;
        }

        .shell.quiz-started .question-accent.statement-media {
          display: block;
          width: min(100%, 220px);
          margin-top: 10px;
        }

        .shell[data-step="results"] .screen {
          min-height: auto;
          padding: 24px;
        }

        .shell[data-step="results"] h2 {
          font-size: 42px;
        }

        .shell[data-step="results"] .prompt {
          margin-top: 10px;
          font-size: 16px;
        }

        .shell[data-step="results"] .result-layout {
          margin-top: 18px;
        }

        .shell[data-step="results"] .result-card {
          padding: 18px;
        }

        .shell[data-step="results"] .actions {
          padding-top: 10px;
        }
      }

      @media (max-width: 1024px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .brand-panel {
          min-height: 430px;
        }

        .brand-media {
          height: min(56vw, 560px);
        }

        .brand-bottom h1 {
          font-size: clamp(40px, 8vw, 72px);
        }

        .quiz-panel {
          min-height: auto;
          padding: 28px;
        }
      }

      @media (max-width: 720px) {
        .brand-panel {
          min-height: auto;
          padding: 20px;
        }

        .brand-media {
          height: 280px;
          min-height: 0;
          margin-top: 28px;
        }

        .shell:not(.quiz-started) .brand-media {
          min-height: 0;
          margin-top: 16px;
        }
